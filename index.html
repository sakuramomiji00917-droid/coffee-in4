<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Global M&A Simulator - CEO Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* =========================================
           🎨 全体スタイル・配色設定
           ========================================= */
        :root {
            --bg: #f8fafc;
            --side: #0f172a;
            --text: #1e293b;
            --mut: #64748b;
            --wh: #ffffff;
            --bl: #2563eb;
            --gr: #059669;
            --re: #dc2626;
            --bor: #e2e8f0;
            --gold: #f59e0b;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* 📱 サイドバー */
        .sidebar {
            width: 260px;
            background: var(--side);
            color: #cbd5e1;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            z-index: 10;
            box-shadow: 2px 0 10px rgba(0, 0, 0, 0.1);
        }

        .sidebar-header {
            padding: 22px;
            font-size: 20px;
            font-weight: 900;
            color: var(--wh);
            border-bottom: 1px solid #1e293b;
            text-align: center;
            letter-spacing: 1px;
        }

        .nav-menu {
            flex: 1;
            overflow-y: auto;
            padding: 15px 0;
        }

        .nav-item {
            padding: 14px 20px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            border-left: 4px solid transparent;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .nav-item:hover {
            background: #1e293b;
            color: var(--wh);
        }

        .nav-item.active {
            background: #1e293b;
            border-left-color: var(--bl);
            color: var(--wh);
        }

        .company-summary {
            padding: 20px;
            background: #020617;
            font-size: 14px;
            border-top: 1px solid #1e293b;
        }

        .company-summary .val {
            color: var(--wh);
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .sidebar-actions {
            padding: 15px;
            background: #020617;
        }

        /* 🖥️ メインコンテンツエリア */
        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .content-area {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
        }

        .view-section {
            display: none;
        }

        .view-section.active {
            display: block;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeOut {
            from {
                opacity: 1;
                transform: scale(1);
            }

            to {
                opacity: 0;
                transform: scale(1.05);
            }
        }

        h2 {
            font-size: 24px;
            margin-top: 0;
            margin-bottom: 20px;
            color: #0f172a;
            border-bottom: 3px solid var(--bl);
            padding-bottom: 10px;
            display: inline-block;
        }

        /* カードとグリッド */
        .card {
            background: var(--wh);
            border-radius: 10px;
            padding: 20px;
            border: 1px solid var(--bor);
            margin-bottom: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .card-header {
            font-weight: 800;
            font-size: 14px;
            margin-bottom: 15px;
            color: var(--mut);
            text-transform: uppercase;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
        }

        .grid-3 {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 15px;
        }

        .grid-4 {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
        }

        /* ステータスボックス */
        .stat-box {
            background: #f8fafc;
            padding: 18px;
            border-radius: 8px;
            border: 1px solid var(--bor);
            text-align: center;
            position: relative;
        }

        .stat-box .label {
            font-size: 12px;
            color: var(--mut);
            margin-bottom: 5px;
            font-weight: bold;
        }

        .stat-box .value {
            font-size: 22px;
            font-weight: 900;
            color: var(--text);
        }

        .badge-ipo {
            position: absolute;
            top: -8px;
            right: -8px;
            background: var(--gold);
            color: var(--wh);
            font-size: 10px;
            padding: 4px 10px;
            border-radius: 12px;
            font-weight: bold;
        }

        .badge-unlisted {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #94a3b8;
            color: var(--wh);
            font-size: 10px;
            padding: 4px 10px;
            border-radius: 12px;
            font-weight: bold;
        }

        /* ボタン類 */
        button {
            border: none;
            padding: 10px 18px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.2s;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        button:hover:not(:disabled) {
            filter: brightness(1.1);
            transform: translateY(-1px);
        }

        .btn-primary {
            background: var(--bl);
            color: var(--wh);
            box-shadow: 0 2px 4px rgba(37, 99, 235, 0.2);
        }

        .btn-large {
            width: 100%;
            padding: 14px;
            font-size: 15px;
            margin-bottom: 10px;
            display: block;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid #94a3b8;
            color: #475569;
        }

        .btn-outline:hover:not(:disabled) {
            border-color: var(--bl);
            color: var(--bl);
            background: #eff6ff;
        }

        .btn-danger {
            background: var(--re);
            color: var(--wh);
        }

        .btn-dark {
            background: #334155;
            color: var(--wh);
        }

        .btn-gold {
            background: var(--gold);
            color: var(--wh);
        }

        .danger-text {
            color: var(--re) !important;
            font-weight: bold;
        }

        .success-text {
            color: var(--gr) !important;
            font-weight: bold;
        }

        /* 入力フォーム・タブ */
        input,
        select {
            padding: 10px 12px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            width: 100%;
            box-sizing: border-box;
            font-family: inherit;
        }

        .region-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 20px;
        }

        .tab-btn {
            background: #fff;
            border: 1px solid #cbd5e1;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
            color: var(--mut);
        }

        .tab-btn.active {
            background: var(--bl);
            color: var(--wh);
            border-color: var(--bl);
        }

        /* テーブル設定 */
        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 800px;
        }

        th,
        td {
            padding: 14px 12px;
            border-bottom: 1px solid var(--bor);
            vertical-align: middle;
            white-space: nowrap !important;
        }

        /* モーダル */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            padding: 15px;
            backdrop-filter: blur(4px);
        }

        .modal-content {
            position: relative;
            background: var(--wh);
            width: 100%;
            max-width: 500px;
            padding: 30px;
            border-radius: 12px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2);
        }

        .close-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 28px;
            background: none;
            border: none;
            cursor: pointer;
            color: #94a3b8;
            padding: 0;
            line-height: 1;
            z-index: 10;
        }

        .close-btn:hover {
            color: #0f172a;
        }

        /* 📱 スマホ完全対応レスポンシブ */
        @media (max-width: 800px) {
            body {
                flex-direction: column;
                overflow-y: auto;
                overflow-x: hidden;
                padding-bottom: 100px;
            }

            .sidebar {
                width: 100% !important;
                height: auto !important;
                padding: 0;
                box-shadow: none;
            }

            .main-container {
                overflow: visible !important;
            }

            .content-area {
                padding: 15px;
                padding-bottom: 120px !important;
            }

            .nav-menu {
                display: flex !important;
                flex-wrap: wrap;
                gap: 5px;
                padding: 10px;
                background: #020617;
            }

            .nav-item {
                flex: 1 1 calc(33.3% - 10px);
                padding: 10px 5px !important;
                text-align: center;
                font-size: 11px;
                justify-content: center;
                background: rgba(255, 255, 255, 0.05);
                border: 1px solid #334155;
                border-radius: 8px;
            }

            .nav-item.active {
                background: var(--bl);
                border-color: var(--bl);
            }

            .btn-next-turn {
                position: fixed !important;
                bottom: 25px !important;
                left: 5% !important;
                width: 90% !important;
                padding: 18px !important;
                font-size: 20px !important;
                z-index: 99999 !important;
                box-shadow: 0 0 30px rgba(37, 99, 235, 0.6);
                border-radius: 50px;
                display: block !important;
                background-color: var(--bl) !important;
                color: #ffffff !important;
            }

            .sidebar-actions {
                display: block !important;
                background: transparent !important;
            }

            .sidebar-actions div {
                display: flex !important;
            }

            .grid-2,
            .grid-3,
            .grid-4 {
                grid-template-columns: 1fr !important;
            }

            table,
            thead,
            tbody,
            tr,
            th,
            td {
                display: block;
                width: 100%;
            }

            thead {
                display: none;
            }

            tr {
                background: #fff;
                margin-bottom: 15px;
                padding: 15px;
                border-radius: 12px;
                border: 1px solid #cbd5e1;
                box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            }

            td {
                text-align: left !important;
                padding: 5px 0 !important;
                border: none !important;
                white-space: normal !important;
            }

            td:nth-child(1) {
                font-size: 20px;
                font-weight: 900;
                color: #0f172a;
                margin-bottom: 8px;
                border-bottom: 1px solid #eee;
                padding-bottom: 8px !important;
            }

            .modal-content {
                width: 95% !important;
                padding: 20px 15px !important;
            }
        }
    </style>
</head>

<body>
    <div id="start-screen"
        style="position: fixed; inset: 0; background: linear-gradient(135deg, #0f172a, #1e293b); z-index: 999999; display: flex; flex-direction: column; justify-content: center; align-items: center; color: #fff;">
        <div style="font-size: 80px; margin-bottom: 10px;">🏢</div>
        <h1 style="font-size: 32px; font-weight: 900; text-align: center; margin: 0 0 10px 0; letter-spacing: 2px;">
            Global M&A Simulator</h1>
        <h2
            style="font-size: 18px; font-weight: bold; color: var(--gold); margin: 0 0 40px 0; border: none; padding: 0;">
            CEO Edition</h2>

        <div style="width: 100%; max-width: 320px; display: flex; flex-direction: column; gap: 15px; padding: 0 20px;">
            <button class="btn-primary"
                style="padding: 16px; font-size: 16px; font-weight: 900; box-shadow: 0 4px 15px rgba(37,99,235,0.4);"
                onclick="startNewGame()">▶️ 会社を設立する (NEW GAME)</button>
            <button class="btn-outline"
                style="padding: 16px; font-size: 16px; font-weight: bold; background: rgba(255,255,255,0.05); color: #cbd5e1; border-color: #475569;"
                onclick="openLoadFromStart()">📂 続きから (LOAD GAME)</button>
        </div>
        <div style="position: absolute; bottom: 30px; font-size: 12px; color: #64748b; font-weight: bold;">© 2026 Global
            M&A Sim</div>
    </div>
    <div class="sidebar">
        <div class="sidebar-header">Global M&A Sim</div>
        <div class="nav-menu">
            <div class="nav-item active" id="nav-stores" onclick="switchTab('stores')">🏪 店舗一覧</div>
            <div class="nav-item" id="nav-world" onclick="switchTab('world')">🌍 店舗予定・不動産</div>
            <div class="nav-item" id="nav-company" onclick="switchTab('company')">📊 財務・方針</div>
            <div class="nav-item" id="nav-hq" onclick="switchTab('hq')">🏢 本社・開発</div>
            <div class="nav-item" id="nav-market" onclick="switchTab('market')">📈 株式市場</div>
            <div class="nav-item" id="nav-vc" onclick="switchTab('vc')">🦄 ベンチャー投資</div>
            <div class="nav-item" id="nav-news" onclick="switchTab('news')">📰 ニュース</div>
        </div>
        <div class="company-summary">
            <div style="color: #94a3b8; font-size: 12px; margin-bottom: 4px;">現在の時間</div>
            <div class="val" id="disp-week">2020年 1月 1週</div>
            <div style="color: #94a3b8; font-size: 12px; margin-bottom: 4px; margin-top: 10px;">手元資金</div>
            <div class="val" id="disp-cash" style="color: #10b981;">¥20,000,000</div>
        </div>
        <div class="sidebar-actions">
            <button class="btn-primary btn-next-turn"
                style="width: 100%; padding: 16px; font-size: 16px; font-weight: 900; border-radius: 8px; margin-bottom: 15px;"
                onclick="executeTurn()">⏭️ 翌週へ進む</button>
            <div style="display: flex; gap: 10px;">
                <button class="btn-outline"
                    style="flex: 1; padding: 8px; font-size: 12px; background: #1e293b; color: #fff; border:none;"
                    onclick="openSaveLoadModal('save')">💾 セーブ</button>
                <button class="btn-outline"
                    style="flex: 1; padding: 8px; font-size: 12px; background: #1e293b; color: #fff; border:none;"
                    onclick="openSaveLoadModal('load')">📂 ロード</button>
            </div>
        </div>
    </div>

    <div class="main-container">
        <div class="content-area" id="main-content-area">
            <div id="view-stores" class="view-section active"></div>
            <div id="view-world" class="view-section"></div>
            <div id="view-company" class="view-section"></div>
            <div id="view-hq" class="view-section"></div>
            <div id="view-market" class="view-section"></div>
            <div id="view-vc" class="view-section"></div>
            <div id="view-news" class="view-section"></div>
        </div>
    </div>
    <div id="modals-area"></div>

    <script>
        // ==========================================
        // 🏗️ データ定義 ＆ クラス設計
        // ==========================================

            { n: "再開発バブル", v: 1.5, r: 1.2, msg: "大規模再開発が決定！地価が急騰しています。", type: "success", scope: "single" },

        const propertyTemplates = [
            { type: "駅前一等地ビル", trafficMult: 2.5, rentMult: 3.0, npcSlots: 8, rarity: 0.1 },
            { type: "大通り路面店", trafficMult: 1.5, rentMult: 1.8, npcSlots: 1, rarity: 0.2 },

                        if (rand < 0.1) template = propertyTemplates[0];      // 駅前
                        else if (rand < 0.2) template = propertyTemplates[3]; // モール
                        else if (rand < 0.4) template = propertyTemplates[1]; // 路面店

                        dist.properties.push({

                `);

        // ==========================================

            window.saveMode = mode;
            let modalsArea = document.getElementById('modals-area');
            let modal = document.getElementById('saveload-modal');
            if (!modal && modalsArea) {
                modalsArea.insertAdjacentHTML('beforeend', `

                    try {
                        let parsed = JSON.parse(data);
                        info = `<b style="color:var(--bl);">${2020 + Math.floor((parsed.week - 1) / 48)}年 ${Math.floor(((parsed.week - 1) % 48) / 4) + 1}月</b> - 所持金: ¥${Math.floor(parsed.companies[0].cash / 10000).toLocaleString()}万`;

                }
                return `<div style="border: 1px solid var(--bor); padding: 15px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; background: #f8fafc;">
                    <div><div style="font-weight: bold; font-size: 14px; margin-bottom: 5px;">スロット ${i}</div><div style="font-size: 13px;">${info}</div></div>
                    <button class="${mode === 'save' ? 'btn-danger' : 'btn-primary'}" style="padding: 10px 20px;" ${mode === 'load' && !data ? 'disabled style="opacity:0.3;"' : ''} onclick="executeSaveLoad(${i})">${mode === 'save' ? 'ここにセーブ' : 'ロード'}</button>
                </div>`;
            }).join('');
            modal.style.display = 'flex';
        };

        window.executeSaveLoad = function (slot) {
            if (window.saveMode === 'save') {
                if (localStorage.getItem('coffeeSave_Slot' + slot) && !confirm(`スロット ${slot} を上書きしますか？`)) return;
                try {
                    localStorage.setItem('coffeeSave_Slot' + slot, JSON.stringify({
                        week, globalTaxRate, playerLobbyBonusTurns, playerTotalDividends, currentRegion, currentMarketSector, currentHQRegion, companies, stockHistory, hqLevel, coffeeQuality, techApp, techRoaster, techMarketing, hiredExecs, execPool, ownedProperties, vcMarket, playerHQ, logHistory: window.logHistory, currentRankingSector: window.currentRankingSector, playerPreviousProfit: window.playerPreviousProfit,
                        globalNetworkData
                    }));
                    alert(`スロット ${slot} にセーブしました！`);
                    closeModal('saveload-modal');
                } catch (e) { alert("セーブ失敗: 容量制限の可能性があります。"); }
            } else {
                let savedStr = localStorage.getItem('coffeeSave_Slot' + slot); if (!savedStr) return;
                try {
                    let d = JSON.parse(savedStr);
                    week = d.week; globalTaxRate = d.globalTaxRate; playerLobbyBonusTurns = d.playerLobbyBonusTurns; playerTotalDividends = d.playerTotalDividends; currentRegion = d.currentRegion; currentMarketSector = d.currentMarketSector; currentHQRegion = d.currentHQRegion || '日本'; hqLevel = d.hqLevel || 0; coffeeQuality = d.coffeeQuality || 1; techApp = d.techApp; techRoaster = d.techRoaster; techMarketing = d.techMarketing; hiredExecs = d.hiredExecs || []; execPool = d.execPool || []; playerHQ = d.playerHQ || null; window.logHistory = d.logHistory || []; stockHistory = d.stockHistory; isGameOver = false; ownedProperties = d.ownedProperties || []; vcMarket = d.vcMarket || []; window.currentRankingSector = d.currentRankingSector || 'coffee'; window.playerPreviousProfit = d.playerPreviousProfit || 0;

                    if (d.globalNetworkData) Object.assign(globalNetworkData, d.globalNetworkData);

                    companies = d.companies.map(cData => {
                        let comp = new Company(cData.id, cData.name, cData.type, cData.cash, cData.sector, cData.stockPrice, cData.isPublic);
                        Object.assign(comp, cData);
                        comp.stores = cData.stores.map(s => {
                            let st = new Store(s.name, s.rent, s.traffic, s.landlord, s.propId, s.regionKey, s.location, s.propIndex);
                            Object.assign(st, s);
                            return st;
                        });
                        return comp;
                    });

                    updateDashboard();
                    if (hqLevel > 0 && typeof updateHQView === 'function') updateHQView();
                    renderNewspaper();
                    if (document.getElementById('view-world').classList.contains('active') && typeof displayDistricts === 'function') {
                        displayDistricts(Object.keys(globalNetworkData)[0]);
                    }
                    closeModal('saveload-modal');
                    alert(`スロット ${slot} をロードしました！`);
                } catch (e) { alert("ロード失敗: データが破損しています。"); }
            }
        };

        // ==========================================
        // 🏪 タブ①：店舗一覧 ＆ 競合視察（利益計算UI統合版）
        // ==========================================
        window.updateStoreSelector = function () {
            let s = document.getElementById('store-view-selector');
            if (!s) return;
            let v = s.value || 'player';
            s.innerHTML = `<option value="player">👑 自社</option>` +
                companies.filter(c => c.sector === 'coffee' && c.id !== 'player' && !c.isBankrupt)
                    .map(c => `<option value="${c.id}">${c.name.replace(/\[.*?\]\s*/, '')}</option>`).join('');
            s.value = v;
            renderStoreList();
        };

        window.renderStoreList = function () {
            let container = document.getElementById('view-stores');
            if (!container) return;

            if (!document.getElementById('store-view-selector')) {
                container.innerHTML = `
                    <h2>🏪 店舗一覧と競合視察</h2>
                    <div style="background:#fff; padding:15px; border-radius:8px; border:1px solid #e2e8f0; margin-bottom: 20px; display:flex; align-items:center; gap:10px;">
                        <span style="font-weight:bold; color:#475569;">表示する企業:</span>
                        <select id="store-view-selector" onchange="renderStoreList()" style="width: 250px; cursor:pointer; font-weight:bold;"></select>
                    </div>
                    <div id="store-list-content" class="grid-2"></div>
                `;
            }

            let s = document.getElementById('store-view-selector');
            if (s && s.children.length === 0) {
                let v = 'player';
                s.innerHTML = `<option value="player">👑 自社</option>` +
                    companies.filter(c => c.sector === 'coffee' && c.id !== 'player' && !c.isBankrupt)
                        .map(c => `<option value="${c.id}">${c.name.replace(/\[.*?\]\s*/, '')}</option>`).join('');
                s.value = v;
            }

            let targetId = s ? s.value : 'player';
            let c = companies.find(x => x.id === targetId) || companies[0];
            let listArea = document.getElementById('store-list-content');

            if (c.stores.length === 0) {
                listArea.innerHTML = `<div style="grid-column: 1/-1; padding:40px; text-align:center; color:#94a3b8; background:#fff; border-radius:8px; border:1px dashed #cbd5e1; font-weight:bold;">店舗がありません</div>`;
                return;
            }

            // シナジーと役員バフの計算
            let synRent = 1.0;
            companies.filter(comp => comp.parent === targetId).forEach(comp => {
                if (comp.sector === 'realestate') synRent -= 0.05;
            });
            synRent = Math.max(0.5, synRent);
            let coo = targetId === 'player' ? hiredExecs.find(e => e.role === 'COO') : null;
            let rentMult = coo ? (1.0 - (coo.level * 0.05)) : 1.0;

            listArea.innerHTML = c.stores.map(st => {
                let isPlayer = c.id === 'player';

                // ★実際のターン処理で出た本物の売上と客数
                let finalTraffic = st.contestedTraffic || st.traffic;
                let sales = st.sales > 0 ? st.sales : Math.floor(finalTraffic * (st.price || 500));

                // ★自社ビル入居の場合は家賃0円、それ以外はシナジー割引適用
                let actualRent = st.rent;
                const distData = globalNetworkData[st.regionKey]?.districts.find(dx => dx.name === st.location);
                if (distData && distData.properties[st.propIndex]?.owner === c.id) {
                    actualRent = 0; // 自社ビル特典
                } else if (isPlayer) {
                    actualRent = Math.floor(st.rent * rentMult * synRent);
                }

                let profit = sales - actualRent;
                let profColor = profit >= 0 ? '#059669' : '#dc2626';
                let closeBtn = isPlayer ? `<button class="btn-outline danger-text" style="width:100%; margin-top:12px; padding:10px; border-color:#fecaca;" onclick="closeStore(${st.id})">❌ 閉店する (違約金: 家賃2ヶ月分)</button>` : '';

                return `<div class="card" style="margin:0; border-top:4px solid ${isPlayer ? '#2563eb' : '#64748b'};">
                    <div style="display:flex; justify-content:space-between; margin-bottom:12px;">
                        <h4 style="margin:0; color:#0f172a; font-size:16px;">${st.name}</h4>
                        <span style="background:#f1f5f9; padding:4px 8px; border-radius:12px; font-size:11px; color:#475569; font-weight:bold;">客数: ${finalTraffic.toLocaleString()}人/週</span>
                    </div>
                    <div style="font-size:13px; color:#475569; line-height:1.6; background:#f8fafc; padding:10px; border-radius:6px;">
                        <div style="display:flex; justify-content:space-between;"><span>📈 週間売上:</span> <b>¥${sales.toLocaleString()}/週</b></div>
                        <div style="display:flex; justify-content:space-between;"><span>🏢 支払家賃:</span> <b>¥${actualRent.toLocaleString()}/週</b></div>
                        <div style="display:flex; justify-content:space-between; margin-top:8px; padding-top:8px; border-top:1px dashed #cbd5e1; font-size:15px;">
                            <span>💰 週間利益:</span> <b style="color:${profColor};">¥${profit.toLocaleString()}</b>
                        </div>
                    </div>
                    ${closeBtn}
                </div>`;
            }).join('');
        };

        window.closeStore = function (storeId) {
            const player = companies[0];
            const idx = player.stores.findIndex(s => s.id === storeId);
            if (idx === -1) return;
            const store = player.stores[idx];
            const penalty = store.rent * 8; // 違約金（2ヶ月分）

            if (!confirm(`【店舗閉鎖】\n「${store.name}」を閉鎖します。\n違約金として ¥${penalty.toLocaleString()} が発生しますが、よろしいですか？`)) return;

            player.cash -= penalty;
            if (store.regionKey && store.location) {
                const dist = globalNetworkData[store.regionKey].districts.find(d => d.name === store.location);
                if (dist && dist.properties[store.propIndex]) {
                    dist.properties[store.propIndex].coffeeTenant = null; // マップ空き枠に戻す
                }
            }
            player.stores.splice(idx, 1);
            addLog(`【撤退】${store.name} を閉鎖しました。(違約金 ¥${penalty.toLocaleString()})`, 'alert', '店舗');
            updateDashboard();
            renderStoreList();
            if (document.getElementById('view-world').classList.contains('active')) displayDistricts(store.regionKey);
        };

        // ==========================================
        // 🌍 タブ②：店舗予定・不動産ネットワーク
        // ==========================================
        window.initGlobalNetwork = function () {
            let container = document.getElementById('view-world');
            if (container && !document.getElementById('region-selector')) {
                container.innerHTML = `
                    <h2>🌍 店舗予定・不動産ネットワーク</h2>
                    <div id="region-selector" style="display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid var(--bor);"></div>
                    <div style="display: flex; flex-wrap: wrap; gap: 20px; align-items: flex-start;">
                        <div style="flex: 2; min-width: 300px;">

                            <h3 style="color: #0f172a; font-size: 16px; margin-top: 0; display: flex; align-items: center; gap: 8px; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px;">🏢 物件スキャナー</h3>
                            <div id="scanner-content" style="font-size: 13px; color: var(--mut); padding: 20px; text-align: center; background: #f8fafc; border-radius: 8px; border: 1px dashed #cbd5e1;">
                                マップ上の都市をクリックすると、<br>そのエリアの物件リストが表示されます。

                `;

        window.displayDistricts = function (regionKey) {
            const grid = document.getElementById('district-grid');
            if (!grid) return;
            const region = globalNetworkData[regionKey];
            grid.innerHTML = '';

            // 1. 各都市のカード生成
            region.districts.forEach(dist => {
                const card = document.createElement('div');
                card.className = 'card';
                card.style = `margin: 0; padding: 15px; border-top: 5px solid ${region.color}; cursor: pointer;`;

                let dotsHtml = '<div style="display: flex; flex-wrap: wrap; gap: 4px; margin-top: 12px;">';
                dist.properties.forEach(prop => {
                    let color = '#e2e8f0'; // 空き
                    if (prop.coffeeTenant === 1) color = '#2563eb'; // 自社出店
                    if (prop.coffeeTenant === 2) color = '#ef4444'; // ライバル出店
                    let border = prop.owner === 'player' ? 'border: 2px solid #059669;' : 'border: 1px solid rgba(0,0,0,0.1);';
                    dotsHtml += `<div style="width: 14px; height: 14px; border-radius: 3px; background: ${color}; ${border}" title="${prop.type}"></div>`;
                });
                dotsHtml += '</div>';

                let devRate = dist.properties.filter(p => p.coffeeTenant !== null).length * 10;
                card.innerHTML = `
                    <div style="font-size: 16px; font-weight: 900; color: #0f172a; margin-bottom: 5px;">${dist.name}</div>
                    <div style="font-size: 12px; color: #64748b; font-weight: bold;">エリア平均家賃: ¥${(dist.rent / 10000).toLocaleString()}万</div>
                    ${dotsHtml}
                    <div style="font-size: 11px; color: ${devRate > 70 ? '#ef4444' : '#94a3b8'}; margin-top: 10px; text-align: right; font-weight: bold;">珈琲激戦度: ${devRate}%</div>
                `;
                card.onclick = () => renderPropertyScanner(regionKey, dist);
                grid.appendChild(card);
            });

            // 2. エリア全体のシェア円グラフ生成（統合版）
            let labels = [], data = [], colors = [];
            companies.forEach(c => {
                if (c.sector !== 'coffee' || c.isBankrupt) return;
                let count = c.stores.filter(s => s.regionKey === regionKey).length;
                if (count > 0) {
                    labels.push(c.id === 'player' ? '自社' : c.name.replace(/\[.*?\]\s*/, ''));
                    data.push(count); colors.push(c.color);
                }
            });

            let totalProps = region.districts.length * 10;
            let occupied = data.reduce((a, b) => a + b, 0);
            if (totalProps > occupied) {
                labels.push('未出店(空き)エリア'); data.push(totalProps - occupied); colors.push('#e2e8f0');
            }

            let chartContainer = document.getElementById('region-share-container');
            if (!chartContainer) {

            if (window.regionShareChart) window.regionShareChart.destroy();
            window.regionShareChart = new Chart(ctx, {
                type: 'doughnut', data: { labels: labels, datasets: [{ data: data, backgroundColor: colors, borderWidth: 1 }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, cutout: '65%' }
            });

            let legendHtml = `<div style="font-weight:900; color:#0f172a; font-size:15px; margin-bottom:8px; border-bottom:1px solid #e2e8f0; padding-bottom:5px;">📊 ${region.name} エリア全体のシェア (全${totalProps}枠)</div>`;
            labels.forEach((l, i) => {

                <div style="display:flex; align-items:center; gap:8px;"><span style="display:inline-block; width:12px; height:12px; background:${colors[i]}; border-radius:3px;"></span><span style="${l === '自社' ? 'font-weight:bold; color:#2563eb;' : ''}">${l}</span></div>
                <div style="font-weight:bold; color:#475569;">${data[i]} 店舗 <span style="font-size:11px; color:#94a3b8;">(${((data[i] / totalProps) * 100).toFixed(1)}%)</span></div>

            });
            document.getElementById('region-share-legend').innerHTML = legendHtml;

        window.renderPropertyScanner = function (regionKey, dist) {

            // 物件リストの生成
            dist.properties.forEach((prop, index) => {
                const isCoffeeOccupied = prop.coffeeTenant !== null;
                let occupyingStoreCo = companies.find(c => c.stores.some(s => s.regionKey === regionKey && s.location === dist.name && s.propIndex === index));
                const tenantName = occupyingStoreCo ? (occupyingStoreCo.id === 'player' ? '👑 自社' : occupyingStoreCo.name.replace(/\[.*?\]\s*/, '')) : "空き";

                const ownerName = prop.owner === 'player' ? "👑 自社所有" : (buildingOwnerCo ? buildingOwnerCo.name.replace(/\[.*?\]\s*/, '') : "NPCオーナー");
                const currentVal = Math.floor(prop.currentValue || (prop.rent * 500));

                let tenantNamesHTML = (prop.tenantList && prop.tenantList.length > 0)
                    ? `<div style="margin-top: 6px; padding: 6px; background: rgba(255,255,255,0.5); border-radius: 4px; font-size: 11px; color: #475569;">
                    🏢 <b>一般テナント:</b> ${prop.tenantList.join(', ')}</div>` : '';

                let borderColor = prop.owner === 'player' ? '#a7f3d0' : '#e2e8f0';

                if (p.debt + amt > p.creditLimit) return alert('与信枠を超えています！店舗を増やして信用を上げてください。');

            } else {
                if (p.cash < amt) return alert('現金が足りません。');
                let repay = Math.min(amt, p.debt);
                if (repay <= 0) return alert('借入はありません。');
                p.cash -= repay; p.debt -= repay; addLog(`【財務】銀行へ ¥${(repay / 10000).toLocaleString()}万 を返済しました。`, 'success', '自社');

            let bought = false;
            for (let id in p.shareholders) {
                if (id !== 'player' && p.shareholders[id] >= 100) {
                    p.shareholders[id] -= 100; p.shareholders['player'] += 100; p.cash -= cost; bought = true;

        window.executeCompanyDilution = function (company, ratioPercent) {
            let ratio = ratioPercent / 100;
            let newSharesCount = Math.floor(company.shares * ratio);
            let raiseAmount = Math.floor(company.stockPrice * newSharesCount);
            let fee = Math.floor(raiseAmount * 0.05);

            company.cash += (raiseAmount - fee);
            company.shares += newSharesCount;
            company.stockPrice = Math.max(10, Math.floor(company.stockPrice / (1 + ratio)));
            company.lastDilutionWeek = week;

            let category = (company.id === 'player') ? '自社' : 'M&A';
            let type = (company.id === 'player') ? 'normal' : 'alert';
            addLog(`【資本政策】${company.name.replace(/\[.*?\]\s*/, '')}が${ratioPercent}%の新株発行を実施。¥${((raiseAmount - fee) / 10000).toLocaleString()}万を調達。`, type, category);

            if (company.id === 'player') {
                alert(`増資が完了しました。\n調達額: ¥${(raiseAmount - fee).toLocaleString()}\n新株価: ¥${company.stockPrice.toLocaleString()}`);

        window.openTradeModal = function (id) {

        window.calcTrade = function () { document.getElementById('trade-estimate-total').innerText = `¥${(companies.find(x => x.id === tradingCompanyId).stockPrice * (parseInt(document.getElementById('trade-amount').value) || 0)).toLocaleString()}`; };

        window.setTradeMax = function () {
            let c = companies.find(x => x.id === tradingCompanyId), p = companies[0];
            if (tradeMode === 'buy') {
                let avail = Math.max(0, c.shares - Object.values(c.shareholders).reduce((x, y) => x + y, 0));
                document.getElementById('trade-amount').value = Math.min(avail, Math.floor(p.cash / c.stockPrice));

            calcTrade();

        window.executeTrade = function () {
            let a = parseInt(document.getElementById('trade-amount').value), c = companies.find(x => x.id === tradingCompanyId), p = companies[0], cost = c.stockPrice * a;
            if (isNaN(a) || a <= 0) return;
            if (tradeMode === 'buy') {
                if (p.cash < cost) return alert("資金不足です！");
                if (Object.values(c.shareholders).reduce((x, y) => x + y, 0) + a > c.shares) return alert("市場に出回っている株が不足しています。");

                let currentOwned = c.shareholders['player'] || 0;
                let newRatio = (currentOwned + a) / c.shares;
                if (newRatio >= 0.40 && c.id !== 'player') return alert("【市場買付の上限】\n市場での直接買付は発行済株式の40%未満に制限されています。\n過半数を取得して買収するには「TOB (公開買付) を宣言する」を使用してください。");

                p.cash -= cost; c.shareholders['player'] = currentOwned + a; c.playerTotalCost += cost;
                addLog(`市場で ${c.name.replace(/\[.*?\]\s*/, '')} の株式を ${a.toLocaleString()}株 購入しました。`, 'normal', 'M&A');
            } else {
                let o = c.shareholders['player'] || 0; if (o < a) return alert("保有株数が不足しています。");

        window.showQuarterlyReport = function (part) {

        // ==========================================
        // 👑 統合マスター版：ターン処理エンジン（executeTurn）
        // ==========================================
        window.executeTurn = function () {
            if (isGameOver) return;
            week++;

            // --- 1. 株主比率の正規化 ---
            companies.forEach(co => {
                if (!co || !co.shareholders || !co.shares) return;
                let total = 0;
                for (let id in co.shareholders) {
                    if (co.shareholders[id] < 0) co.shareholders[id] = 0;
                    if (co.shareholders[id] > co.shares) co.shareholders[id] = Math.floor(co.shares * 0.51);
                    total += co.shareholders[id];
                }
                if (total > co.shares && total > 0) {
                    const factor = co.shares / total;
                    for (let id in co.shareholders) co.shareholders[id] = Math.floor(co.shareholders[id] * factor);
                }
                if (co.shareholders['player'] === undefined) co.shareholders['player'] = 0;
            });

            // --- 2. マクロ環境の変動 ---
            if (Math.random() < 0.05) {
                globalTaxRate = Math.random() > 0.5 ? 0.30 : 0.15;
                addLog(`【政治】法人税率が ${(globalTaxRate * 100).toFixed(0)}% に変更されました。`, globalTaxRate > 0.2 ? 'alert' : 'success', '政治');
            }
            if (playerLobbyBonusTurns > 0) playerLobbyBonusTurns--;
            if (week % 12 === 0 && typeof generateExecPool === 'function') generateExecPool();

            // --- 3. VC市場の変動とIPO判定 ---
            vcMarket.forEach(vc => {
                if (vc.status !== 'Active' || week - vc.spawnWeek < 1) return;
                companies.forEach(c => {
                    if (c.id === 'player' || c.isBankrupt || !c.isPublic) return;
                    if (c.cash > vc.val * 0.5 && Math.random() < (c.sector === 'securities' ? 0.08 : 0.01)) {
                        let amt = Math.floor(vc.val * (Math.random() * 0.15 + 0.05));
                        c.cash -= amt; vc.investors[c.id] = (vc.investors[c.id] || 0) + amt; vc.val += amt;
                    }
                });
                vc.hype = vc.hype || 0;
                if (Math.random() < 0.06) {
                    if (Math.random() > 0.3) { vc.val += Math.floor(vc.val * (Math.random() * 0.03 + 0.02)); vc.hype += 0.05; }
                    else { vc.val = Math.max(10000, vc.val - Math.floor(vc.val * (Math.random() * 0.05 + 0.02))); vc.hype -= 0.08; }
                }
            });

            if (week % 4 === 0) {
                vcMarket.forEach(vc => {
                    if (vc.status !== 'Active') return;
                    if (Math.random() < 0.40) {
                        let myInv = vc.investors['player'] || 0;
                        if (Math.random() < (0.10 - (vc.hype || 0))) {
                            vc.status = 'Bankrupt';
                            if (myInv > 0) addLog(`【VC倒産】投資先 ${vc.name} が倒産。投資金 ¥${myInv.toLocaleString()} がゼロに…。`, 'alert', '特報');
                        } else if (Math.random() < (0.45 + ((vc.hype || 0) * 0.5)) || vc.stageIdx >= 4) {
                            vc.status = 'IPO';
                            let finalVal = Math.floor(vc.val * (Math.random() * 5.0 + 3.0)), newShares = 2000000, initPrice = Math.max(10, Math.floor(finalVal / newShares));
                            let newShareholders = {};
                            for (let invId in vc.investors) newShareholders[invId] = Math.floor(newShares * (vc.investors[invId] / vc.val));

                            let newCo = new Company(vc.id, `[新規公開] ${vc.name}`, 'vc', Math.floor(finalVal), vc.sector, initPrice, true, newShares);
                            newCo.shareholders = newShareholders; newCo.playerTotalCost = myInv;
                            companies.push(newCo);

                            if (stockHistory && stockHistory.labels) stockHistory.datasets[vc.id] = Array(stockHistory.labels.length).fill(initPrice);
                            addLog(`【🦄特報：IPO！】スタートアップ ${vc.name} が新規上場！`, 'success', '特報');
                        } else {
                            vc.stageIdx++; vc.val = vc.targets ? vc.targets[vc.stageIdx] : Math.floor(vc.val * 2);
                            for (let invId in vc.investors) if (invId !== 'player') vc.investors[invId] = Math.floor(vc.val * (vc.investors[invId] / (vc.val / 2)) * (Math.random() * 0.1 + 0.95));
                        }
                    }
                });
            }
            if (typeof generateStartup === 'function') while (vcMarket.filter(v => v.status === 'Active').length < 6) generateStartup();

            // --- 4. バフとシナジー計算 ---
            let syn = { rent: 1.0, traffic: 1.0, margin: 1.0 };
            companies.filter(c => c.parent === 'player').forEach(c => {
                if (c.sector === 'realestate') syn.rent -= 0.05;
                if (c.sector === 'semiconductor' || c.sector === 'game') syn.traffic += 0.07;
                if (c.sector === 'auto' || c.sector === 'space') syn.margin += 0.05;
            });
            syn.rent = Math.max(0.5, syn.rent); syn.traffic = Math.min(2.0, syn.traffic);

            let coo = hiredExecs.find(e => e.role === 'COO'), cmo = hiredExecs.find(e => e.role === 'CMO'), cfo = hiredExecs.find(e => e.role === 'CFO'), cto = hiredExecs.find(e => e.role === 'CTO');
            let rentMult = coo ? (1.0 - (coo.level * 0.05)) : 1.0, trafficMult = cmo ? (1.0 + (cmo.level * 0.08)) : 1.0, taxDiscount = cfo ? (cfo.level * 0.05) : 0, appBonus = cto ? (0.15 + (cto.level * 0.05)) : 0.15;

            // --- 5. 客の奪い合いアルゴリズム ---
            let districtDemands = {};
            companies.forEach(c => {
                if (c.sector !== 'coffee' || c.isBankrupt) return;
                c.stores.forEach(s => {
                    if (!s.regionKey || !s.location) return;
                    let dKey = `${s.regionKey}_${s.location}`;
                    if (!districtDemands[dKey]) districtDemands[dKey] = { totalTraffic: 0, stores: [] };

                    let appeal = 100;
                    if (c.id === 'player') {
                        appeal *= (1.0 + (coffeeQuality - 1) * 0.1);
                        if (techMarketing) appeal *= 1.3;
                        if (techApp) appeal *= (1.0 + appBonus);
                        appeal *= trafficMult * syn.traffic;
                    } else {
                        appeal *= (1.0 + (c.marketCap / 500000000));
                    }
                    let densityBonus = c.stores.filter(st => st.regionKey === s.regionKey && st.location === s.location).length;
                    appeal *= (1.0 + (densityBonus * 0.05));

                    s.tempAppeal = appeal;
                    districtDemands[dKey].totalTraffic += s.traffic;
                    districtDemands[dKey].stores.push({ store: s, compId: c.id });
                });
            });

            Object.keys(districtDemands).forEach(dKey => {
                let dInfo = districtDemands[dKey];
                let totalAppeal = dInfo.stores.reduce((sum, item) => sum + item.store.tempAppeal, 0);
                dInfo.stores.forEach(item => {
                    let share = item.store.tempAppeal / totalAppeal;
                    item.store.contestedTraffic = Math.floor(dInfo.totalTraffic * share);
                });
            });

            // --- 6. 収益計算 ＆ AI行動 ---
            let p = companies[0], pRev = 0, pExp = 0, pDiv = 0, pTax = 0, pNet = 0, pPropInc = 0;
            let trend = Math.sin(week / 5) * 0.02;

            companies.forEach(c => {
                if (c.isBankrupt) return;
                let prof = 0;

                if (c.sector === 'coffee' || c.sector === 'food') {
                    c.stores.forEach(s => {
                        let finalTraffic = s.contestedTraffic || s.traffic;
                        let rent = s.rent;
                        const d = globalNetworkData[s.regionKey]?.districts.find(dx => dx.name === s.location);
                        if (d && d.properties[s.propIndex]?.owner === c.id) rent = 0;
                        else if (c.id === 'player') rent = Math.floor(rent * rentMult * syn.rent);

                        let rev = Math.floor(finalTraffic * (s.price || 500) * (Math.random() * 0.2 + 0.9));
                        let sp = rev - rent;
                        s.sales = rev; s.customers = finalTraffic;

                        if (c.id === 'player') {
                            if (techRoaster && sp > 0) sp *= 1.2;
                            sp *= syn.margin;
                            pRev += rev; pExp += rent;
                        }
                        prof += sp;
                    });
                } else {
                    prof = Math.floor(c.marketCap * 0.003 * (1 + (Math.random() * 0.6 - 0.3)));
                }

                let exp = Math.floor(c.debt * 0.01);
                if (c.id === 'player') {
                    if (cfo) exp = Math.floor(exp * 0.8);
                    if (hqLevel > 0) {
                        exp += [1000000, 3000000, 6000000, 10000000, 20000000][hqLevel - 1] || 1000000;
                        if (playerHQ && playerHQ.isRented) {
                            exp += playerHQ.rent;
                            if (playerHQ.owner && playerHQ.owner !== 'player') {
                                let ownerCo = companies.find(oc => oc.id === playerHQ.owner);
                                if (ownerCo) ownerCo.cash += playerHQ.rent;
                            }
                        }
                    }
                    if (techMarketing) exp += 3000000;
                    hiredExecs.forEach(e => exp += e.salary);
                    pExp += exp;
                }
                prof -= exp;

                let taxR = c.id === 'player' ? Math.max(0, (playerLobbyBonusTurns > 0 ? 0.10 : globalTaxRate) - taxDiscount) : globalTaxRate;
                let tax = prof > 0 ? Math.floor(prof * taxR) : 0;
                prof -= tax;

                let dividendTotal = 0;
                if (c.isPublic && prof > 0 && c.dividendRate > 0) {
                    dividendTotal = Math.floor(prof * (c.dividendRate / 100));
                    c.lastDividendPerShare = Math.floor(dividendTotal / c.shares);
                    prof -= dividendTotal;

                    // ★ プレイヤーがこの会社の株を持っていれば配当金を受け取る
                    if (c.id !== 'player' && c.shareholders['player'] > 0) {
                        pDiv += c.lastDividendPerShare * c.shareholders['player'];
                    }
                } else {
                    c.lastDividendPerShare = 0;
                }

                c.cash += prof;
                // ★ 全企業の利益を決算用の累計（qNet）に溜める
                c.qNet = (c.qNet || 0) + prof;

                if (c.id === 'player') { pTax = tax; pNet = prof; }

                // AI思考：M&A
                if (c.id !== 'player' && c.isPublic && c.cash > 50000000) {
                    // 行動1：市場での静かな買付（限界は39%まで）
                    if (Math.random() < 0.25) {
                        let targets = companies.filter(t => t.id !== c.id && t.isPublic && !t.isBankrupt && (t.shareholders[c.id] || 0) < Math.floor(t.shares * 0.39));
                        if (targets.length > 0) {
                            let target = targets[Math.floor(Math.random() * targets.length)];
                            let currentOwned = target.shareholders[c.id] || 0;
                            let limitTo40 = Math.floor(target.shares * 0.39) - currentOwned;
                            let maxBuyShares = Math.floor(target.shares * (Math.random() * 0.05 + 0.03));
                            let sharesToBuy = Math.min(Math.floor(c.cash * 0.2 / target.stockPrice), maxBuyShares, limitTo40);

                            if (sharesToBuy > 100) {
                                c.cash -= sharesToBuy * target.stockPrice;
                                target.shareholders[c.id] = currentOwned + sharesToBuy;
                            }
                        }
                    }

                    // 行動2：AIによる「敵対的TOB」の宣言
                    if (Math.random() < 0.05) {
                        let tobTargets = companies.filter(t => t.id !== c.id && t.isPublic && !t.isBankrupt && !t.activeTOB && t.parent !== c.id);
                        if (tobTargets.length > 0) {
                            let target = tobTargets[Math.floor(Math.random() * tobTargets.length)];
                            let premiumPrice = Math.floor(target.stockPrice * 1.3);
                            let targetShares = Math.floor(target.shares * 0.51) + 1;
                            let currentOwned = target.shareholders[c.id] || 0;
                            let sharesToBuy = Math.max(0, targetShares - currentOwned);
                            let totalCost = premiumPrice * sharesToBuy;

                            if (sharesToBuy > 0 && c.cash >= totalCost * 1.2) {
                                target.activeTOB = { bidder: c.id, price: premiumPrice, targetShares: sharesToBuy, startWeek: week, deadline: week + 2 };
                                addLog(`【TOB開始】${c.name.replace(/\[.*?\]\s*/, '')} が ${target.name.replace(/\[.*?\]\s*/, '')} に対して敵対的TOBを宣言！（決着まで2週）`, 'alert', 'M&A');
                                if (typeof showMarketAlert === 'function') showMarketAlert("🚨 TOB (株式公開買付) 宣言！", target.name.replace(/\[.*?\]\s*/, ''), `${c.name.replace(/\[.*?\]\s*/, '')}が敵対的TOBを仕掛けました！プレミアム価格は ¥${premiumPrice.toLocaleString()} です。`, "alert");
                                target.stockPrice = premiumPrice;
                            }
                        }
                    }
                }

                // AI思考：不動産買収
                if (c.id !== 'player' && c.cash > 100000000 && Math.random() < 0.15) {
                    const rKeys = Object.keys(globalNetworkData);
                    const rKey = rKeys[Math.floor(Math.random() * rKeys.length)];
                    const dist = globalNetworkData[rKey].districts[Math.floor(Math.random() * globalNetworkData[rKey].districts.length)];
                    const prop = dist.properties.find(px => px.owner === null);

                    if (prop) {
                        const price = prop.rent * 500;
                        if (c.cash >= price) {
                            c.cash -= price; prop.owner = c.id;
                            if (prop.coffeeTenant === 1) addLog(`【警告】${c.name}が自社ビルを買収！`, 'alert', '不動産');
                        }
                    }
                }

                // AI思考：防衛策（ポイズンピル等）
                if (c.id !== 'player') {
                    if (!c.lastDilutionWeek || (week - c.lastDilutionWeek) >= 48) {
                        if (c.activeTOB && Math.random() < 0.3) {
                            addLog(`【防衛】${c.name.replace(/\[.*?\]\s*/, '')}が買収への対抗措置として新株発行を強行！`, 'alert', 'M&A');
                            if (typeof executeCompanyDilution === 'function') executeCompanyDilution(c, 20);
                        } else if (c.cash < 5000000 && c.stockPrice > 1000 && Math.random() < 0.05) {
                            if (typeof executeCompanyDilution === 'function') executeCompanyDilution(c, 10);
                        }
                    }
                }
                c.stockPrice = Math.max(10, Math.floor(c.stockPrice * (1.0 + trend + (prof > 0 ? 0.015 : -0.015))));
            });

            // プレイヤー配当金の受け取り
            playerTotalDividends += pDiv; p.cash += pDiv;

            // ゲームオーバー判定
            if (Object.keys(p.shareholders).filter(k => k !== 'player').reduce((s, k) => s + p.shareholders[k], 0) >= p.shares / 2) {
                isGameOver = true; alert("【GAME OVER】株式の過半数を買収され、会社を乗っ取られました。");
            }
            if (companies.filter(c => c.sector === 'coffee' && c.id !== 'player' && !c.isBankrupt).length < 4 && typeof spawnAI === 'function') spawnAI(false);

            // --- 7. 不動産価値変動 ＆ 号外ニュース ＆ 家賃徴収 ---
            let cashBeforeProp = p.cash;
            let marketEvent = null;
            if (Math.random() < 0.08) {
                marketEvent = realEstateEvents[Math.floor(Math.random() * realEstateEvents.length)];
                const rKeys = Object.keys(globalNetworkData);
                marketEvent.targetCity = (marketEvent.scope === "single") ? rKeys[Math.floor(Math.random() * rKeys.length)] : null;
                let targetName = marketEvent.targetCity ? globalNetworkData[marketEvent.targetCity].name : '全世界';
                addLog(`【世界情勢】${marketEvent.n}：${targetName}で${marketEvent.msg}`, marketEvent.type, "経済");
                if (typeof showMarketAlert === 'function') showMarketAlert(marketEvent.n, targetName, marketEvent.msg, marketEvent.type);
            }

            Object.keys(globalNetworkData).forEach(rk => {
                globalNetworkData[rk].districts.forEach(d => {
                    d.properties.forEach(prop => {
                        if (!prop.currentValue) prop.currentValue = prop.rent * 500;
                        let fluctuation = 1 + (Math.random() * 0.04 - 0.02);
                        if (marketEvent && (marketEvent.scope === "global" || rk === marketEvent.targetCity)) {
                            fluctuation *= marketEvent.v; prop.rent = Math.floor(prop.rent * marketEvent.r);
                        }
                        prop.currentValue = Math.floor(prop.currentValue * fluctuation);

                        if (!prop.owner) return;
                        let ownerCo = companies.find(c => c.id === prop.owner);
                        if (!ownerCo) return;
                        if (prop.coffeeTenant !== null && prop.coffeeTenant !== 1) ownerCo.cash += prop.rent;
                        if (prop.npcSlots > 0) {
                            if (!prop.tenantList) prop.tenantList = [];
                            if (prop.occupiedNPCSlots < prop.npcSlots && Math.random() < 0.1) {
                                prop.occupiedNPCSlots++;
                                const npcCos = companies.filter(c => c.id !== 'player' && c.sector !== 'coffee');
                                if (npcCos.length > 0) {
                                    const newTenant = npcCos[Math.floor(Math.random() * npcCos.length)];
                                    const cleanName = newTenant.name.replace(/\[.*?\]\s*/, '');
                                    prop.tenantList.push(cleanName);
                                    if (prop.owner === 'player') addLog(`【不動産】あなたのビルに ${cleanName} がオフィスを開設！`, 'success', '不動産');
                                }
                            }
                            ownerCo.cash += Math.floor(prop.rent * 0.5 * prop.occupiedNPCSlots);
                        }
                    });
                });
            });

            ownedProperties.forEach(op => {
                if (op.rk && op.idx !== undefined) {
                    let mapProp = globalNetworkData[op.rk].districts.find(d => d.name === op.distName)?.properties[op.idx];
                    if (mapProp) { op.currentValue = mapProp.currentValue; op.rent = mapProp.rent; }
                }
            });

            pPropInc = p.cash - cashBeforeProp;

            // --- 8. TOB決着 ---
            companies.forEach(c => {
                if (c.activeTOB && (week - c.activeTOB.startWeek) >= 2) {
                    let tob = c.activeTOB, bidderCo = companies.find(x => x.id === tob.bidder);
                    let poisonPill = c.id !== 'player' && Math.random() < (tob.isSilent ? 0.10 : 0.30);
                    if (poisonPill) {
                        c.shares += Math.floor(c.shares * 0.5);
                        tob.targetShares = Math.floor(c.shares * 0.51) + 1 - (c.shareholders[tob.bidder] || 0);
                        addLog(`【防衛策発動】${c.name.replace(/\[.*?\]\s*/, '')} が新株発行で買収に徹底抗戦！`, 'alert', 'M&A');
                        if (typeof showMarketAlert === 'function') showMarketAlert("🛡️ ポイズンピル発動", c.name.replace(/\[.*?\]\s*/, ''), `買収防衛策として大規模な新株発行を強行しました！`, "alert");
                    }
                    let totalCost = tob.price * tob.targetShares;
                    if (bidderCo && bidderCo.cash >= totalCost) {
                        bidderCo.cash -= totalCost; c.shareholders[tob.bidder] = (c.shareholders[tob.bidder] || 0) + tob.targetShares;
                        if (bidderCo.id === 'player') c.playerTotalCost += totalCost;
                        let originalName = c.name.includes('傘下] ') ? c.name.split('] ')[1] : c.name;
                        c.name = `[${bidderCo.name.replace(/\[.*?\]\s*/, '').substring(0, 8)}傘下] ${originalName}`; c.parent = bidderCo.id;
                        addLog(`【買収完了】${bidderCo.name.replace(/\[.*?\]\s*/, '')} が ${originalName} を子会社化！`, 'success', 'M&A');
                        if (typeof showMarketAlert === 'function') showMarketAlert("🤝 買収完了", originalName, `過半数の株式取得が完了し、${bidderCo.name.replace(/\[.*?\]\s*/, '')}の完全子会社となりました！`, "success");
                        bidderCo.stockPrice = Math.floor(bidderCo.stockPrice * 1.15); c.stockPrice = Math.floor(c.stockPrice * 1.20);
                    } else {
                        addLog(`【買収失敗】資金不足により ${c.name.replace(/\[.*?\]\s*/, '')} の買収は頓挫しました。`, 'alert', 'M&A');
                        if (typeof showMarketAlert === 'function') showMarketAlert("❌ 買収失敗", c.name.replace(/\[.*?\]\s*/, ''), `買付側 (${bidderCo ? bidderCo.name.replace(/\[.*?\]\s*/, '') : '不明'}) の資金不足により、TOBは不成立となりました。`, "alert");
                        c.stockPrice = Math.floor(c.stockPrice * 0.8);
                    }
                    delete c.activeTOB;
                }
            });

            // サイレント買収の手続き（2週間猶予）
            companies.forEach(co => {
                if (!co || co.isBankrupt || co.id === 'player' || !co.shareholders) return;
                for (let ownerId in co.shareholders) {
                    if (ownerId === co.id) continue;
                    if ((co.shareholders[ownerId] / co.shares) > 0.50 && co.parent !== ownerId && !co.activeTOB) {
                        co.activeTOB = { bidder: ownerId, price: 0, targetShares: 0, startWeek: week, deadline: week + 2, isSilent: true };
                        let ownerCo = companies.find(x => x.id === ownerId);
                        let bidderName = (ownerId === 'player') ? '自社' : (ownerCo ? ownerCo.name.replace(/\[.*?\]\s*/, '').substring(0, 6) : ownerId);
                        addLog(`【買収手続き】${bidderName} が ${co.name.replace(/\[.*?\]\s*/, '')} の過半数株式を取得！ 2週間後に子会社化されます。`, 'alert', 'M&A');
                        if (typeof showMarketAlert === 'function') showMarketAlert("⚠️ 買収手続き開始", co.name.replace(/\[.*?\]\s*/, ''), `${bidderName}がすでに過半数の株式を取得！2週間後に子会社化されます。`, "alert");
                    }
                }
            });

            stockHistory.labels.push(week);
            companies.forEach(c => { if (!c.isBankrupt && c.isPublic) stockHistory.datasets[c.id].push(c.stockPrice); });

            let currentProfit = pNet + pDiv + pPropInc;

            // --- 9. 決算モーダル描画 ---
            let modalsArea = document.getElementById('modals-area');
            let summaryModal = document.getElementById('summary-modal');
            if (!summaryModal && modalsArea) {
                modalsArea.insertAdjacentHTML('beforeend', `
                    <div id="summary-modal" class="modal-overlay">
                        <div class="modal-content" style="max-width: 400px;">
                            <button class="close-btn" onclick="closeModal('summary-modal'); updateDashboard();">×</button>
                            <h3 style="margin-top:0; border-bottom: 2px solid #e5e7eb; padding-bottom: 10px;"><span id="modal-week"></span> 週間決算</h3>
                            <div style="display:flex; justify-content:space-between; margin-bottom:8px; font-size: 15px;"><span>☕ 店舗売上・粗利</span><span id="modal-store-profit" style="font-weight:bold;">¥0</span></div>
                            <div style="display:flex; justify-content:space-between; margin-bottom:8px; font-size: 15px;"><span>🏢 経費 (給与/HQ/利息)</span><span id="modal-interest" class="danger-text">-¥0</span></div>
                            <div style="display:flex; justify-content:space-between; margin-bottom:8px; font-size: 15px;"><span>💰 受取配当金 (投資益)</span><span id="modal-dividend" class="success-text">+¥0</span></div>
                            <div style="display:flex; justify-content:space-between; margin-bottom:8px; padding-bottom: 8px; border-bottom: 1px dashed #cbd5e1; font-size: 15px;">
                                <span>🏢 不動産収入</span><span id="modal-property-income" class="success-text">+¥0</span>
                            </div>
                            <div style="display:flex; justify-content:space-between; margin-bottom:8px; margin-top: 8px; font-size: 15px;">
                                <span>📈 税引前利益</span><span id="modal-pretax" style="font-weight: bold;">¥0</span>
                            </div>
                            <div style="display:flex; justify-content:space-between; margin-bottom:15px; font-size: 15px;"><span>🏛️ 法人税等</span><span id="modal-tax" class="danger-text">-¥0</span></div>
                            <div style="display:flex; justify-content:space-between; margin-bottom:10px; border-top:1px solid #1e293b; padding-top:15px; font-weight:900; font-size: 22px;">
                                <span>最終純利益</span><span id="modal-profit">¥0</span>
                            </div>
                            <div style="text-align:right; font-size: 15px; margin-bottom: 15px; padding-top: 10px; border-top: 1px dashed #cbd5e1;" id="modal-profit-comparison"></div>
                            <button class="btn-primary btn-large" style="margin-top: 10px; font-weight:bold;" onclick="closeModal('summary-modal'); updateDashboard();">確認</button>
                        </div>
                    </div>
                `);
                summaryModal = document.getElementById('summary-modal');
            }

            document.getElementById('modal-week').innerText = `${2020 + Math.floor((week - 2) / 48)}年 ${Math.floor(((week - 2) % 48) / 4) + 1}月 ${((week - 2) % 4) + 1}週`;
            document.getElementById('modal-store-profit').innerText = `¥${(pRev - pExp).toLocaleString()}`;
            document.getElementById('modal-dividend').innerText = `+¥${pDiv.toLocaleString()}`;
            document.getElementById('modal-property-income').innerText = `+¥${pPropInc.toLocaleString()}`;
            document.getElementById('modal-pretax').innerText = `¥${((pRev - pExp) + pDiv + pPropInc).toLocaleString()}`;
            document.getElementById('modal-tax').innerText = `-¥${pTax.toLocaleString()}`;

            let elProf = document.getElementById('modal-profit');
            elProf.innerText = `¥${currentProfit.toLocaleString()}`;
            elProf.className = currentProfit >= 0 ? 'success-text' : 'danger-text';

            let diff = currentProfit - (window.playerPreviousProfit || 0);
            let compText = (window.playerPreviousProfit || 0) === 0 ? (currentProfit >= 0 ? "+100.0%" : "-100.0%") : `${diff >= 0 ? '+' : ''}${((diff / Math.abs(window.playerPreviousProfit)) * 100).toFixed(1)}%`;
            document.getElementById('modal-profit-comparison').innerHTML = `前回比: <span style="color:${diff > 0 ? '#10b981' : (diff < 0 ? '#ef4444' : '#64748b')}; font-weight:bold; font-size:16px;">${diff > 0 ? '↗' : (diff < 0 ? '↘' : '→')} ${compText}</span>`;

            // --- 10. レポート処理とデータのクリーンアップ ---
            window.playerPreviousProfit = currentProfit;
            updateDashboard();
            renderNewspaper();

            // 今週のニュースをポップアップで表示（週刊 M&A ジャーナル）
            let thisWeekStr = `${2020 + Math.floor((week - 2) / 48)}年 ${Math.floor(((week - 2) % 48) / 4) + 1}月 ${((week - 2) % 4) + 1}週`;
            let weeklyNews = window.logHistory.filter(l => l.week === thisWeekStr);

            if (weeklyNews.length > 0) {
                let newsList = weeklyNews.map(n => `<li style="margin-bottom:8px; border-bottom:1px solid #eee; padding-bottom:5px; list-style:none;"><b>【${n.category}】</b> ${n.msg}</li>`).join('');
                showMarketAlert("📰 週刊 M&A ジャーナル", "通常版", `<ul style="text-align:left; padding:0; margin:0; max-height:250px; overflow-y:auto;">${newsList}</ul>`, "news");
            }

            // 12週目なら決算特別号を出す
            if (week > 1 && (week - 1) % 12 === 0) {
                companies.forEach(c => {
                    c.prevQProfit = c.lastQProfit || 0;
                    c.lastQProfit = c.qNet || 0;
                });
                setTimeout(() => {
                    if (typeof showQuarterlyReport === 'function') showQuarterlyReport(1);
                    companies.forEach(c => c.qNet = 0); // 報告後にリセット
                }, 1500);
            }
            summaryModal.style.display = 'flex';
        };

        // ==========================================
        // 🚀 ゲーム起動 ＆ タイトル画面制御
        // ==========================================
        window.onload = function () {
            initGame(); // 裏側で世界を初期化しておく
        };

        window.startNewGame = function () {
            // NEW GAMEを押したら、フェードアウトして裏側の世界を見せる
            let screen = document.getElementById('start-screen');
            screen.style.animation = 'fadeOut 0.5s ease-out forwards';
            setTimeout(() => { screen.style.display = 'none'; }, 500);
        };

        window.openLoadFromStart = function () {
            // LOAD GAMEを押したら、スタート画面を消してロードモーダルを出す
            document.getElementById('start-screen').style.display = 'none';
            openSaveLoadModal('load');
        };
    </script>
</body>

</html>
