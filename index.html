                    <!-- ▼ 返済のシミュレーション表示 ▼ -->
                    <div style="text-align:center; font-size:11px; font-weight:bold; color:var(--text-mut); margin-bottom:15px; background:rgba(255,255,255,0.05); padding:8px; border-radius:6px; border:1px solid rgba(255,255,255,0.1);">
                        ※借入後の次週から負担する定時返済額: 毎週 約 <span id="borrow-preview-val" style="color:var(--danger); font-size:14px; margin:0 4px;">¥--万</span> (元本5% + 利息)
                    </div>
                    <div class="grid-2" style="gap:10px;">
                        <div style="display:flex; gap:10px;">
                            <button class="btn-primary" style="flex:1; background:var(--success);" onclick="executeBankAction('deposit')">💰 普通預金</button>
                            <button class="btn-outline" style="flex:1; border-color:var(--success); color:var(--success);" onclick="executeBankAction('withdraw')">引き出す</button>
                        </div>
                        <div style="display:flex; gap:10px;">
                            <button class="btn-primary" style="flex:1; background:var(--danger);" onclick="executeBankAction('borrow')">借り入れる</button>
                            <button class="btn-outline" style="flex:1; border-color:var(--danger); color:var(--danger);" onclick="executeBankAction('repay')">返済する</button>
                        </div>
                    </div>
                    <button class="btn-primary" style="width:100%; margin-top:10px; background:var(--gold); color:#000; font-weight:900;" onclick="executeBankAction('term_deposit')">🔒 定期預金（1年ロック・週+0.3%）</button>
                    <div id="disp-term-deposits" style="margin-top:10px; font-size:12px;"></div>
                </div>
                <h3>⚙️ アクション</h3>
                <div class="grid-2" style="margin-bottom:30px;">
                    ${!p.isPublic ? `<div class="card" style="border: 2px solid var(--warning); background:#fffbeb;">
                        <div class="card-header" style="color:var(--gold);">📈 IPO（新規上場申請）</div>
                        ${p._ipoApplied ? `<div style="text-align:center;padding:10px;color:var(--primary);font-weight:900;">⏳ 審査中... あと${Math.max(1,4-(week-p._ipoApplied))}週間</div>` : `
                        <div style="font-size:12px;color:var(--text-mut);margin-bottom:10px;line-height:1.7;">
                            <div>✅/❌ 時価総額10億以上: <b>${(p.stockPrice*p.shares)>=1000000000?'✅':'❌'} ¥${Math.floor((p.stockPrice*p.shares)/10000).toLocaleString()}万</b></div>
                            <div>✅/❌ 黒字4期連続: <b>${(p._profitStreak||0)>=4?'✅':'❌'} ${p._profitStreak||0}期</b></div>
                        </div>
                        <button class="btn-warning btn-large" style="font-weight:900;" onclick="goPublic()">🏦 上場申請する（審査費¥5,000万）</button>`}
                    </div>` : `<div class="card" style="border:2px solid var(--success);background:#f0fdf4;padding:14px;">
                        <div style="font-weight:900;color:var(--success);font-size:15px;">📈 上場済み企業</div>
                        <div style="font-size:12px;color:var(--text-mut);margin-top:6px;">融資上限2倍 / TOB防衛権あり / 株主総会あり</div>
                    </div>`}
                    <div class="card"><div class="card-header">💰 配当性向 (%)</div><div style="font-size:24px; font-weight:900; color:var(--primary); text-align:center; margin-bottom:10px;"><span id="disp-div-rate">${p.dividendRate || 0}</span>%</div><input type="range" min="0" max="100" value="${p.dividendRate || 0}" oninput="document.getElementById('disp-div-rate').innerText=this.value" onchange="updateDivRateFinal(this.value)"></div>
                    <div class="card"><div class="card-header">🏛️ 政治献金 (ロビー)</div><div style="display:flex; gap:10px; margin-bottom:10px;"><input type="number" id="lobby-input" value="5000" step="1000" style="flex:1;"><b>万円</b></div><button class="btn-dark btn-large" onclick="doLobbying()">献金して減税(10%)を獲得</button></div>
                    ${!p.isPublic ? '' : `<div class="card" style="grid-column: 1 / -1;"><div class="card-header">📈 公募増資 (自社株発行)</div>
                        <div style="display:flex; gap:20px; align-items:center; margin-bottom:12px;">
                            <div style="flex:1;">
                                <label style="font-weight:bold; font-size:14px;">発行比率: <span id="dilution-range-val" class="text-success">10</span>%</label>
                                <input type="range" id="dilution-range" min="5" max="30" step="5" value="10" oninput="
                                    document.getElementById('dilution-range-val').innerText=this.value;
                                    let ratio=parseInt(this.value)/100;
                                    let newShares=Math.floor(${p.shares}*ratio);
                                    let raise=Math.floor(newShares*${p.stockPrice}*0.9);
                                    let newPrice=Math.floor(${p.stockPrice}*(1-ratio*0.6));
                                    document.getElementById('dilution-preview').innerHTML=
                                        '💰 調達額: <b class=text-success>¥'+raise.toLocaleString()+'</b>　　'
                                        +'📉 株価: <b>¥${p.stockPrice.toLocaleString()}</b> → <b class=text-danger>¥'+newPrice.toLocaleString()+'</b>';
                                ">
                            </div>
                            <button class="btn-primary" style="padding:15px 30px;" onclick="executePlayerDilution()" ${p.lastDilutionWeek && (week - p.lastDilutionWeek) < 48 ? 'disabled' : ''}>新株を発行して資金調達</button>
                        </div>
                        <div id="dilution-preview" style="font-size:13px; font-weight:bold; background:#f9fafb; border:1px solid var(--border); border-radius:8px; padding:10px 14px; color:var(--text-main);">
                            💰 調達額: <b class="text-success">¥${Math.floor(p.shares * 0.1 * p.stockPrice * 0.9).toLocaleString()}</b>　　📉 株価: <b>¥${p.stockPrice.toLocaleString()}</b> → <b class="text-danger">¥${Math.floor(p.stockPrice * 0.94).toLocaleString()}</b>
                        </div>
                    </div>`}
                </div>
                <h3>🏢 所有ビル一覧</h3>
                <div id="owned-props-grid" class="grid-3"></div>
            `;
            setTimeout(updateBankUI, 10);
            setTimeout(renderOwnedPropsGrid, 20);
        };

        window._pfSell = function (btn) {
            var d = btn.dataset;
            sellBuildingFromPortfolio(d.rk2, d.dn2, parseInt(d.idx2), parseInt(d.val));
        };
        window._pfRentChange = function (input) {
            var d = input.dataset;
            var r = parseInt(input.value);
            var avg = parseInt(d.avg) || r;
            // データ更新（changeRentが店舗rentも連動して更新）
            changeRent(d.rk, d.dn, parseInt(d.idx), r, avg);
            // 金額表示
            var el = document.getElementById('pf-rent-' + d.pid);
            if (el) el.innerText = '¥' + (r / 10000).toLocaleString() + '万';
            // ヒント更新
            var ratio = avg > 0 ? r / avg : 1;
            var lbl = ratio > 1.3 ? '🔴 高め' : ratio < 0.7 ? '🟢 安め' : '🟡 平均的';
            var clr = ratio > 1.3 ? 'var(--danger)' : ratio < 0.7 ? 'var(--success)' : 'var(--warning)';
            var msg = ratio > 1.3 ? 'が退去しやすい' : ratio < 0.7 ? 'が集まりやすい' : 'の出入りは安定';
            var hintEl = document.getElementById('pf-hint-' + d.pid);
            if (hintEl) { hintEl.innerText = 'テナント' + msg; hintEl.style.color = clr; }
            var lblEl = document.getElementById('pf-rlabel-' + d.pid);
            if (lblEl) { lblEl.innerText = lbl + ' (平均¥' + Math.floor(avg / 10000).toLocaleString() + '万)'; lblEl.style.color = clr; }
        };
        window.renderOwnedPropsGrid = function () {
            let grid = document.getElementById('owned-props-grid');
            if (!grid) return;

            // ── フィルターUIを挿入（初回のみ）──
            let filterBar = document.getElementById('owned-props-filter');
            if (!filterBar) {
                filterBar = document.createElement('div');
                filterBar.id = 'owned-props-filter';
                filterBar.style.cssText = 'display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;align-items:center;';
                // 国フィルター
                let countries = [...new Set(ownedProperties.filter(p=>p.owner==='player').map(p=>p.country))].filter(Boolean);
                let countryOpts = `<option value="ALL">🌍 全地域</option>` + countries.map(c=>`<option value="${c}">${c}</option>`).join('');
                filterBar.innerHTML = `
                    <select id="opf-country" style="padding:6px 10px;border-radius:8px;border:1px solid var(--border);font-size:12px;background:var(--bg);cursor:pointer;" onchange="renderOwnedPropsGrid()">
                        ${countryOpts}
                    </select>
                    <select id="opf-sort" style="padding:6px 10px;border-radius:8px;border:1px solid var(--border);font-size:12px;background:var(--bg);cursor:pointer;" onchange="renderOwnedPropsGrid()">
                        <option value="default">📋 デフォルト順</option>
                        <option value="income_desc">💰 収益 高い順</option>
                        <option value="income_asc">💰 収益 低い順</option>
                        <option value="value_desc">📈 時価 高い順</option>
                    </select>
                    <label style="font-size:12px;display:flex;align-items:center;gap:4px;cursor:pointer;">
                        <input type="checkbox" id="opf-vacant" onchange="renderOwnedPropsGrid()"> 空き枠あり
                    </label>`;
                grid.parentNode.insertBefore(filterBar, grid);
            }

            let _opfCountry = document.getElementById('opf-country')?.value || 'ALL';
            let _opfSort = document.getElementById('opf-sort')?.value || 'default';
            let _opfVacant = document.getElementById('opf-vacant')?.checked || false;

            let myProps2 = ownedProperties.filter(function (p) { return p.owner === 'player'; });
            // 国フィルター
            if (_opfCountry !== 'ALL') myProps2 = myProps2.filter(p => p.country === _opfCountry);
            // 空き枠フィルター
            if (_opfVacant) {
                myProps2 = myProps2.filter(p => {
                    let d = globalNetworkData[p.rk]?.districts.find(d=>d.name===p.distName);
                    let mp = d?.properties[p.idx];
                    return mp && (mp.coffeeTenant === null || (mp.npcSlots > 0 && mp.occupiedNPCSlots < mp.npcSlots));
                });
            }

            if (myProps2.length === 0) {
                grid.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:30px; color:var(--text-mut); background:var(--bg); border-radius:12px;">条件に合うビルがありません</div>';
                return;
            }

            // 収益・時価を事前計算
            myProps2 = myProps2.map(pr => {
                let distObj = globalNetworkData[pr.rk]?.districts.find(d=>d.name===pr.distName);
                let mp = distObj?.properties[pr.idx];
                let inc = 0;
                if (mp) {
                    if (mp.occupiedNPCSlots > 0) inc += mp.rent * mp.occupiedNPCSlots;
                    if (mp.coffeeTenant !== null && mp.coffeeTenant !== 1) inc += mp.rent;
                }
                return { ...pr, _income: inc, _value: pr.currentValue || 0 };
            });
            // ソート
            if (_opfSort === 'income_desc') myProps2.sort((a,b) => b._income - a._income);
            else if (_opfSort === 'income_asc') myProps2.sort((a,b) => a._income - b._income);
            else if (_opfSort === 'value_desc') myProps2.sort((a,b) => b._value - a._value);

            let html = '';
            myProps2.forEach(function (pr) {
                let distObj = null;
                if (globalNetworkData[pr.rk] && globalNetworkData[pr.rk].districts) {
                    distObj = globalNetworkData[pr.rk].districts.find(function (d) { return d.name === pr.distName; });
                }
                let mapProp2 = distObj ? distObj.properties[pr.idx] : null;
                let occupied = mapProp2 ? (mapProp2.occupiedNPCSlots || 0) : 0;
                let totalSlots = mapProp2 ? (mapProp2.npcSlots || 0) : 0;
                let hasCoffee = mapProp2 && mapProp2.coffeeTenant !== null && mapProp2.coffeeTenant !== 1;
                let curRent = mapProp2 ? mapProp2.rent : (pr.rent || 100000);
                let rentInc = 0;
                if (mapProp2) {
                    if (mapProp2.occupiedNPCSlots > 0) rentInc += curRent * mapProp2.occupiedNPCSlots;
                    if (hasCoffee) rentInc += curRent;
                }
                let avgRent2 = curRent;
                if (distObj && mapProp2) {
                    let sameType = distObj.properties.filter(function (x) { return x.type === mapProp2.type; });
                    if (sameType.length > 0) avgRent2 = Math.floor(sameType.reduce(function (s, x) { return s + x.rent; }, 0) / sameType.length);
                }
                let ratio2 = avgRent2 > 0 ? curRent / avgRent2 : 1;
                let rlabel = ratio2 > 1.3 ? '🔴 高め' : ratio2 < 0.7 ? '🟢 安め' : '🟡 平均的';
                let rcolor = ratio2 > 1.3 ? 'var(--danger)' : ratio2 < 0.7 ? 'var(--success)' : 'var(--warning)';
                let minR2 = Math.max(50000, Math.floor(avgRent2 * 0.3));
                let maxR2 = Math.floor(avgRent2 * 3.0);
                let step2 = Math.max(10000, Math.floor(avgRent2 * 0.05));
                let safeId = String(pr.id || (pr.rk + pr.distName + pr.idx)).replace(/[^a-zA-Z0-9_-]/g, '_');

                html += '<div class="card" style="margin:0; padding:16px; display:flex; flex-direction:column; gap:6px;">'
                    + '<div style="font-weight:900; font-size:14px;">' + (pr.name || '物件') + '</div>'
                    + '<div style="font-size:11px; color:var(--text-mut);">' + (pr.country || '') + '</div>'
                    + '<div style="font-size:12px; display:flex; flex-direction:column; gap:3px;">'
                    + '<div class="flex-between"><span style="color:var(--text-mut);">時価:</span><b class="text-success">¥' + Math.floor(pr.currentValue / 10000).toLocaleString() + '万</b></div>'
                    + '<div class="flex-between"><span style="color:var(--text-mut);">週次収入:</span><b style="color:var(--primary);">+¥' + rentInc.toLocaleString() + '</b></div>'
                    + (function () {
                        // コーヒーテナント名を取得
                        let tenantName = '';
                        if (mapProp2 && mapProp2.coffeeTenant === 2) {
                            // NPC企業を検索
                            let tenantCo = companies.find(function (co) {
                                return co.sector === 'coffee' && !co.isBankrupt && co.stores && co.stores.some(function (st) {
                                    return st.propId === (mapProp2.id || null) || (st.regionKey === pr.rk && st.location === pr.distName && st.propIndex === pr.idx);
                                });
                            });
                            tenantName = tenantCo ? tenantCo.name.replace(/\[.*?\]\s*/g, '') : '他社';
                        }
                        let tenantDisplay = '';
                        if (mapProp2 && mapProp2.coffeeTenant !== null) {
                            tenantDisplay = '☕ ' + (mapProp2.coffeeTenant === 1 ? '👑 自社' : tenantName);
                        }
                        let npcDisplay = totalSlots > 0 ? ' + ' + occupied + '/' + totalSlots + '社' : '';
                        return '<div class="flex-between"><span style="color:var(--text-mut);">テナント:</span><span style="font-weight:bold; font-size:11px;">' + (tenantDisplay || (totalSlots > 0 ? occupied + '/' + totalSlots + '社' : '—')) + (tenantDisplay && totalSlots > 0 ? npcDisplay : '') + '</span></div>';
                    })()
                    + '</div>'
                    + '<div style="border-top:1px dashed var(--border); padding-top:8px;">'
                    + '<div class="flex-between" style="margin-bottom:4px; font-size:11px;">'
                    + '<span style="font-weight:bold;">💰 家賃設定</span>'
                    + '<span id="pf-rlabel-' + safeId + '" style="font-weight:bold; color:' + rcolor + ';">' + rlabel + ' (平均¥' + Math.floor(avgRent2 / 10000).toLocaleString() + '万)</span>'
                    + '</div>'
                    + '<input type="range" min="' + minR2 + '" max="' + maxR2 + '" step="' + step2 + '" value="' + curRent + '"'
                    + ' style="width:100%; accent-color:var(--primary); cursor:pointer;"'
                    + ' data-rk="' + pr.rk + '" data-dn="' + pr.distName + '" data-idx="' + pr.idx + '" data-avg="' + avgRent2 + '" data-pid="' + safeId + '"'
                    + ' oninput="window._pfRentChange(this)">'
                    + '<div class="flex-between" style="font-size:11px; margin-top:2px;">'
                    + '<span style="color:var(--text-mut);">¥' + Math.floor(minR2 / 10000).toLocaleString() + '万</span>'
                    + '<b id="pf-rent-' + safeId + '" style="color:var(--gold);">¥' + Math.floor(curRent / 10000).toLocaleString() + '万</b>'
                    + '<span style="color:var(--text-mut);">¥' + Math.floor(maxR2 / 10000).toLocaleString() + '万</span>'
                    + '</div>'
                    + '<div id="pf-hint-' + safeId + '" style="font-size:11px; text-align:center; margin-top:4px; font-weight:bold; color:' + rcolor + ';">'
                    + 'テナント' + (ratio2 > 1.3 ? 'が退去しやすい' : ratio2 < 0.7 ? 'が集まりやすい' : 'の出入りは安定') + '</div>'
                    + '</div>'
                    + '<button style="margin-top:4px; padding:7px; font-size:12px; width:100%; background:none; border:1px solid #fca5a5; color:#ef4444; border-radius:8px; cursor:pointer;"'
                    + ' data-rk2="' + pr.rk + '" data-dn2="' + pr.distName + '" data-idx2="' + pr.idx + '" data-val="' + pr.currentValue + '"'
                    + ' onclick="window._pfSell(this)">💰 売却する</button>'
                    + '</div>';
            });
            grid.innerHTML = html;
        };

        // 🏦 銀行機能のロジック
        // 🏦 銀行UI更新（純粋な表示のみ）
        window.updateBankUI = function () {
            let p = companies[0];
            let selectEl = document.getElementById('player-bank-selector');
            if (!selectEl) return;
            let currentBankId = selectEl.value;
            let b = companies.find(x => x.id === currentBankId);
            if (!b) return;

            let currentDep = p.deposits ? (p.deposits[currentBankId] || 0) : 0;
            let currentDebt = p.bankDebts ? (p.bankDebts[currentBankId] || 0) : 0;
            let dRate2 = ((b.depositRate || 0.0005) * 100).toFixed(3);
            let tdRate = ((b.termDepositRate || 0.003) * 100).toFixed(3);
            let lRate = ((b.loanRate || 0.005) * 100).toFixed(3);
            let bLabel = b.bankTypeLabel || '';

            document.getElementById('disp-player-deposit').innerText = `¥${currentDep.toLocaleString()}`;
            document.getElementById('disp-player-debt').innerText = `¥${currentDebt.toLocaleString()}`;
            document.getElementById('disp-player-deposit-label').innerText = `普通預金残高 ${bLabel} 週+${dRate2}%`;
            document.getElementById('disp-player-debt-label').innerText = `借入残高 週-${lRate}%（定期: 週+${tdRate}%）`;

            // 定期預金一覧
            let tdEl = document.getElementById('disp-term-deposits');
            if (tdEl) {
                let tds = (p.termDeposits || []);
                if (tds.length === 0) {
                    tdEl.innerHTML = '<div style="color:var(--text-mut); text-align:center; padding:8px;">定期預金なし</div>';
                } else {
                    tdEl.innerHTML = '<div style="font-weight:bold; margin-bottom:6px;">📋 定期預金一覧</div>'
                        + tds.map(td => {
                            let remaining = 48 - (week - td.startWeek);
                            let bankName = companies.find(c => c.id === td.bankId)?.name.replace(/\[.*?\]\s*/, '') || td.bankId;
                            let maturityVal = td.amount + Math.floor(td.amount * td.rate * 48);
                            return `<div style="background:#fff; border:1px solid var(--gold); border-radius:6px; padding:8px 10px; margin-bottom:4px; font-size:11px;">
                                <div class="flex-between"><b style="color:var(--gold);">${bankName}</b><span style="color:var(--danger);">あと ${remaining}週</span></div>
                                <div class="flex-between" style="margin-top:3px;">
                                    <span>元本: ¥${td.amount.toLocaleString()}</span>
                                    <span style="color:var(--success);">満期: ¥${maturityVal.toLocaleString()}</span>
                                </div>
                            </div>`;
                        }).join('');
                }
            }

            // 普通預金のプラス金利収入予告
            let totalDep = Object.values(p.deposits || {}).reduce((s, v) => s + v, 0);
            let weeklyGain = Math.floor(totalDep * 0.0005);
            let feeEl = document.getElementById('disp-player-deposit-label');
            if (feeEl && weeklyGain > 0) {
                feeEl.innerText = `普通預金残高 (週 +¥${weeklyGain.toLocaleString()} 金利)`;
            }

            if (window.updateBorrowPreview) window.updateBorrowPreview();
        };

        // 🏦 銀行変更のトリガー（ここだけでアラート判定を行う）
        window.handleBankChangeTrigger = function (newBankId) {
            let p = companies[0];
            if (p.mainBankId && p.mainBankId !== newBankId) {
                // すでに1回変更済みの場合はブロック
                if (p._bankSwitched) {
                    document.getElementById('player-bank-selector').value = p.mainBankId;
                    let warn = document.getElementById('bank-lock-warning');
                    if (warn) {
                        warn.style.display = 'block';
                        warn.innerText = '🔒 銀行変更は1回のみ可能です（変更済み）';
                    } else {
                        alert('【銀行規制】銀行の変更は1回のみ可能です。');
                    }
                    return;

        window.submitAuctionBid = function(sellerId, targetId, topBidderId, topBid) {

            let seller = companies.find(x => x.id === sellerId);
            let target = companies.find(x => x.id === targetId);
            let p = companies[0];
            closeModal('auction-modal');
            if (!seller || !target) return;
            if (bidVal > topBid && p.cash >= bidVal) {
                // プレイヤー落札
                p.cash -= bidVal; seller.cash += bidVal;
                target.parent = 'player';
                let cleanName = target.name.replace(/\[.*?\]\s*/g,'');
                target.name = `👑 [自社傘下] ${cleanName}`;
                target.shareholders['player'] = (target.shareholders['player'] || 0) + Math.floor(target.shares * 0.51);
                addLog(`【入札落札】${cleanName} を ¥${Math.floor(bidVal/10000).toLocaleString()}万 で落札しました！`, 'success', 'M&A');
            } else if (bidVal <= topBid && topBidderId) {
                // AIが落札
                let topBidder = companies.find(x => x.id === topBidderId);
                if (topBidder) {
                    topBidder.cash -= topBid; seller.cash += topBid;
                    target.parent = topBidder.id;
                    target.name = `[${topBidder.name.replace(/\[.*?\]\s*/,'').slice(0,4)}傘下] ${target.name.replace(/\[.*?\]\s*/,'')}`;
                    addLog(`【入札】${target.name.replace(/\[.*?\]\s*/,'')} は ${topBidder.name.replace(/\[.*?\]\s*/,'')} が ¥${Math.floor(topBid/10000).toLocaleString()}万 で落札しました。`, 'news', 'M&A');

        window.executeTrade = function () {
            let a = parseInt(document.getElementById('trade-amount').value), c = companies.find(x => x.id === tradingCompanyId), p = companies[0], cost = c.stockPrice * a;
            if (isNaN(a) || a <= 0) return;
            if (tradeMode === 'buy') {
                if (p.cash < cost) return alert("資金不足です！");
                if (Object.values(c.shareholders).reduce((x, y) => x + y, 0) + a > c.shares) return alert("市場に出回っている株が不足しています。");

                let currentOwned = c.shareholders['player'] || 0;
                let newRatio = (currentOwned + a) / c.shares;
                // 市場直接買付は40%未満に制限
                if (newRatio >= 0.40 && c.id !== 'player') return alert("【法規制】市場での直接買付は発行済株式の40%未満に制限されています。\n過半数を取得して買収するには「TOB (公開買付)」を宣言してください。");

                p.cash -= cost; c.shareholders['player'] = currentOwned + a; c.playerTotalCost += cost;
                addLog(`市場で ${c.name.replace(/\[.*?\]\s*/, '')} を ${a.toLocaleString()}株 購入しました。`, 'normal', 'M&A');
            } else {
                let o = c.shareholders['player'] || 0; if (o < a) return alert("保有株数が不足しています。");

                window.weeklyStockSaleProfit = (window.weeklyStockSaleProfit || 0) + (profitPerShare * a);

                p.cash += cost; c.playerTotalCost -= (c.playerTotalCost / o) * a; c.shareholders['player'] -= a;

            closeModal('trade-modal'); updateDashboard(); renderPortfolio();

        window.executeDebtEquitySwap = function () {
            let c = companies.find(x => x.id === window.tradingCompanyId), p = companies[0];
            let debt = c.debtToPlayer || 0;
            if (debt <= 0) return;

            // 20%ディスカウントで株式を強制発行させる
            let swapPrice = Math.max(10, Math.floor(c.stockPrice * 0.8));
            let sharesToGet = Math.floor(debt / swapPrice);

            if (confirm(`【デット・エクイティ・スワップ (DES) 実行】\n貸付残高 ¥${debt.toLocaleString()} を放棄し、代わりに相手の株式を取得します。\n\n転換価格: ¥${swapPrice.toLocaleString()} (市場の20%引)\n取得株数: ${sharesToGet.toLocaleString()} 株\n\n本当に実行しますか？`)) {
                c.debtToPlayer = 0; // 借金帳消し
                c.shares += sharesToGet; // 新株発行（相手の株が希薄化）
                c.shareholders['player'] = (c.shareholders['player'] || 0) + sharesToGet; // あなたの持株が増える
                c.playerTotalCost += debt;

                // 新株発行により株価が下がる
                c.stockPrice = Math.max(10, Math.floor(c.marketCap / c.shares));

                addLog(`【DES実行】債権を株式に転換し、${c.name.replace(/\[.*?\]\s*/, '')} の株式 ${sharesToGet.toLocaleString()} 株を取得しました！`, 'alert', 'M&A');

        // ==========================================

                <h3 style="border-bottom:2px solid var(--danger);padding-bottom:8px;margin-bottom:14px;color:var(--danger);">🆘 破産申請中企業（救済買収チャンス）</h3>
                <div class="grid-2">` +
                    bankruptCandidates.map(cx => {

                            </div>

                                <div style="font-size:10px;color:var(--text-mut);">時価総額</div>
                                <b>¥${Math.floor(cx.marketCap / 10000).toLocaleString()}万</b>
                            </div>
                        </div>
                        <div style="background:#fff5f5;border:1px solid #fecaca;border-radius:8px;padding:10px;margin-bottom:12px;font-size:12px;line-height:1.8;">

                            ${cx.sector === 'coffee' ? `<div class="flex-between"><span>🏪 店舗数:</span><b>${cx.stores.length}店舗</b></div>` : ''}
                        </div>
                        <div style="font-size:11px;color:#7c3aed;background:#f5f3ff;border-radius:6px;padding:8px;margin-bottom:10px;">
                            💡 救済買収すると: 子会社として傘下に入り、借金は国内銀行が肩代わり（週5%ずつ自社が返済）
                        </div>
                        <button class="btn-danger" style="width:100%;font-weight:900;" onclick="playerRescueAcquisition('${cx.id}')">
                            🆘 救済買収する
                        </button>
                    </div>`;
                    }).join('') + `</div></div>`;

            let html = `
                <div class="flex-between" style="margin-bottom:24px; border-bottom:3px solid var(--primary); padding-bottom:12px;">

                </div>
                ${rescueHtml}
                <div class="grid-2">
            `;
            subs.forEach(sub => {
                let subProps = ownedProperties.filter(p => p.owner === sub.id);
                html += `
                <div class="card" style="border-top:6px solid var(--primary); display:flex; flex-direction:column;">
                    <div class="flex-between" style="margin-bottom:15px;">
                        <div>
                            <div style="font-size:11px; color:var(--primary); font-weight:bold;">[自社傘下]</div>
                            <h3 style="margin:0; font-size:18px;">${sub.name.replace(/\[.*?\]\s*/, '')}</h3>
                        </div>
                        <div style="text-align:right;"><div style="font-size:10px; color:var(--text-mut);">時価総額</div><b class="text-success">¥${sub.marketCap.toLocaleString()}</b></div>
                    </div>
                    <div style="background:#f9fafb; padding:12px; border-radius:8px; margin-bottom:20px; font-size:13px; line-height:1.6; flex:1;">

                        <div class="flex-between"><span>🏪 店舗数:</span> <b>${sub.stores.length}店舗</b></div>

                        <button class="btn-primary" style="font-size:12px; padding:10px;" onclick="subActionForceStockSell('${sub.id}')">📉 株売却命令</button>
                        <button class="btn-primary" style="font-size:12px; padding:10px;" onclick="subActionMergeWith('${sub.id}')">🤝 別子会社と合併</button>
                        <button class="btn-danger" style="font-size:12px; padding:10px;" onclick="subActionMerge('${sub.id}')">🏭 吸収合併（解散）</button>
                    </div>
                </div>`;
            });
            html += `</div>`;

            // ── 孫会社セクション ──
            if (grandSubs.length > 0) {

                    <div class="grid-2">`;
                grandSubs.forEach(gs => {
                    let parentSub = companies.find(c => c.id === gs.parent);
                    let gsProps = ownedProperties.filter(p => p.owner === gs.id);
                    let sIcon = { coffee: '☕', bank: '🏦', re: '🏢', log: '🚚', it: '💻', ins: '🛡️', sogo: '🏬', ad: '📣' }[gs.sector] || '🏭';
                    html += `<div class="card" style="border-top:4px solid #7c3aed;display:flex;flex-direction:column;">

                            <button class="btn-primary" style="font-size:11px;padding:8px;grid-column:span 2;" onclick="subActionElevate('${gs.id}')">⬆️ 直接子会社に昇格させる</button>
                            <button class="btn-danger" style="font-size:11px;padding:8px;grid-column:span 2;" onclick="subActionMerge('${gs.id}')">🏭 吸収合併（解散）</button>
                        </div>

                html += `</div></div>`;

        window.playerRescueAcquisition = function (targetId) {
            let p = companies[0];
            let cx = companies.find(x => x.id === targetId);
            if (!cx || !cx._bankruptProc || cx.isBankrupt) return alert('この企業はすでに買収できない状態です。');

            let totalDebt = Object.values(cx.bankDebts || {}).reduce((s, v) => s + v, 0);
            let assets = Object.values(cx.deposits || {}).reduce((s, v) => s + v, 0)
                + (cx.termDeposits || []).reduce((s, td) => s + td.amount, 0)
                + Math.max(0, cx.cash);
            let netDebt = Math.max(0, totalDebt - assets);
            let cName = cx.name.replace(/\[.*?\]\s*/, '');

            if (!confirm(`【救済買収】${cName} を傘下に収めますか？\n\n肩代わり負債: ¥${Math.floor(netDebt / 10000).toLocaleString()}万\n（銀行肩代わり後、毎週5%ずつ自社が返済）\n\n※ 買収コストは象徴的な1円です。`)) return;

            // 資産売却で返済
            cx.termDeposits = []; cx.deposits = {};
            let remaining = netDebt;
            let cCountry = cx.country || 'JP';
            let guarantorBank = companies.find(bk => bk.sector === 'bank' && !bk.isBankrupt && (bk.country === cCountry || !bk.country));
            cx.bankDebts = {};
            if (remaining > 0 && guarantorBank) {
                guarantorBank.cash -= remaining;
                cx._guarantorDebt = { bankId: guarantorBank.id, amount: remaining };
                addLog(`【銀行肩代わり】${guarantorBank.name.replace(/\[.*?\]\s*/, '')} が再建中の ${cName} の借金を肩代わり。残債：¥${Math.floor(remaining / 10000).toLocaleString()}万`, 'warning', '経済');
            }
            cx.parent = 'player';
            // プレイヤーも55%株式取得
            if (!cx.shareholders) cx.shareholders = {};
            let pRescueShares = Math.ceil((cx.shares || 10000) * 0.55);
            for (let sid in cx.shareholders) {
                cx.shareholders[sid] = Math.floor(cx.shareholders[sid] * 0.45);
            }
            cx.shareholders['player'] = pRescueShares;
            cx.name = '👑 [自社傘下] ' + cName + ' [再建中]';
            // 再建進捗を初期化
            cx._rebirthStartWeek = week;
            delete cx._bankruptProc; delete cx._bankruptProcWeek;
            addLog(`【救済買収】${cName} をプレイヤーが救済買収しました！傘下として再建スタート（55%取得）。`, 'success', 'M&A');
            updateDashboard();
            renderSubsidiaryList();
        };

        // 💰 資金援助（プレイヤー→子会社/孫会社）
        window.subActionInject = function (subId) {
            let p = companies[0], sub = companies.find(c => c.id === subId);
            if (!sub) return;
            let options = [10000000, 50000000, 100000000, 500000000];
            let chosen = options.find(v => v <= p.cash * 0.5) || options[0];

        // 📉 株売却命令（子会社/孫会社が保有する他社株を売却させる）

        // 🤝 子会社同士の合併命令
        window.subActionMergeWith = function (subId) {
            let p = companies[0], sub = companies.find(c => c.id === subId);
            if (!sub) return;
            let others = companies.filter(c => c.parent === 'player' && c.id !== subId);
            if (others.length === 0) return alert('合併相手となる子会社がありません。');
            let list = others.map((c, i) => `${i + 1}. ${c.name.replace(/\[.*?\]\s*/g, '')} (時価総額 ¥${Math.floor(c.marketCap / 10000).toLocaleString()}万)`).join('\n');
            let idx = parseInt(prompt(`【子会社合併】${sub.name.replace(/\[.*?\]\s*/g, '')} をどの会社に吸収させますか？\n(${sub.name.replace(/\[.*?\]\s*/g, '')} → 存続会社 に統合されます)\n\n${list}\n\n存続会社の番号を入力:`)) - 1;
            if (isNaN(idx) || idx < 0 || idx >= others.length) return;
            let survivor = others[idx];
            if (!confirm(`【子会社合併】\n消滅: ${sub.name.replace(/\[.*?\]\s*/g, '')}\n存続: ${survivor.name.replace(/\[.*?\]\s*/g, '')}\n\n消滅会社の資産・店舗が存続会社に移ります。実行しますか？`)) return;
            // ── 資産移転 ──
            survivor.cash += sub.cash;
            // 普通預金引継ぎ
            if (sub.deposits) {
                for (let bid in sub.deposits) {
                    if (!survivor.deposits) survivor.deposits = {};

                }
            }
            // 定期預金引継ぎ
            (sub.termDeposits || []).forEach(td => {
                if (!survivor.termDeposits) survivor.termDeposits = [];
                survivor.termDeposits.push({ ...td });
            });
            // 借入債務引継ぎ
            if (sub.bankDebts) {
                for (let bid in sub.bankDebts) {
                    if (!survivor.bankDebts) survivor.bankDebts = {};
                    survivor.bankDebts[bid] = (survivor.bankDebts[bid] || 0) + sub.bankDebts[bid];
                }
            }
            (sub.stores || []).forEach(s => { s.name = `[統合] ${s.name.replace(/\[.*?\]\s*/g, '')}`; survivor.stores.push(s); });
            ownedProperties.forEach(prop => { if (prop.owner === subId) prop.owner = survivor.id; });
            Object.keys(globalNetworkData).forEach(rk => {
                globalNetworkData[rk].districts.forEach(d => {

            companies.forEach(c => { if (c.parent === subId) c.parent = survivor.id; });

            // ── 発行株式数の合算・株主引継ぎ ──
            let subTotalShares = sub.shares || 10000;
            let survivorOldShares = survivor.shares || 10000;
            // 消滅会社の株価/存続会社の株価 で交換比率を計算
            let exchRatio = sub.stockPrice > 0 && survivor.stockPrice > 0
                ? sub.stockPrice / survivor.stockPrice : 1.0;
            // 消滅会社の各株主へ存続会社の株を交換
            for (let sid in (sub.shareholders || {})) {
                let subSH = sub.shareholders[sid] || 0;
                if (subSH <= 0) continue;
                let newShares = Math.floor(subSH * exchRatio);
                if (!survivor.shareholders) survivor.shareholders = {};
                if (sid === survivor.id) continue; // 自己株は消去
                survivor.shareholders[sid] = (survivor.shareholders[sid] || 0) + newShares;
            }
            // 存続会社の発行株式数増加
            let newSharesTotal = Math.floor(subTotalShares * exchRatio);
            survivor.shares = (survivor.shares || 10000) + newSharesTotal;
            // 時価総額は株数×株価で自動計算されるので株価を資産ベースで補正
            let combinedAssets = (survivor.cash || 0) + (sub.cash || 0);
            let newStockPrice = survivor.shares > 0
                ? Math.max(survivor.stockPrice, Math.floor((survivor.stockPrice * survivorOldShares + sub.stockPrice * subTotalShares) / survivor.shares))
                : survivor.stockPrice;
            survivor.stockPrice = newStockPrice;

            companies.forEach(cx => {

                }

            let subIdx = companies.findIndex(c => c.id === subId);
            let newMktCap = Math.floor(survivor.stockPrice * survivor.shares / 10000);
            addLog(`【子会社合併】${sub.name.replace(/\[.*?\]\s*/g, '')} → ${survivor.name.replace(/\[.*?\]\s*/g, '')} に統合。発行株数: ${survivor.shares.toLocaleString()}株 / 時価総額: ¥${newMktCap.toLocaleString()}万`, 'success', 'M&A');
            companies.splice(subIdx, 1);
            renderSubsidiaryList(); updateDashboard();
        };

        window.subActionMerge = function (subId) {

`;

`;

`;
            msg += `定期預金: ¥${Math.floor(subTermDeps/10000).toLocaleString()}万
`;

`;

純取得資産: ¥${Math.floor((totalSubAssets - buyCost)/10000).toLocaleString()}万`;

        };
        // ==========================================

                <div style="background:linear-gradient(135deg,#f8fafc,#fff);border-bottom:1px solid #e2e8f0;padding:20px 24px 0;">

            // ── タブ別コンテンツ ──
            if (tab === 'profile') {

                let subs = companies.filter(c => c.id !== cid && (c.parent === cid || (c.shareholders[cid] / c.shares) > 0.5));

                }).join('') : '<div style="color:var(--text-mut);text-align:center;padding:15px;">子会社なし</div>';
                let portfolioHtml = ''; let portCount = 0;
                companies.forEach(c => { if (c.id !== cid && c.shareholders[cid] > 0) { portCount++; portfolioHtml += `<div class="flex-between" style="border-bottom:1px dashed var(--border);padding:10px 0;font-size:13px;"><span>📈 ${c.name.replace(/\[.*?\]\s*/, '').substring(0, 18)}</span><span style="font-weight:bold;color:var(--primary);">¥${(c.stockPrice * c.shareholders[cid] / 10000).toLocaleString()}万</span></div>`; } });

                        <div style="width:100%;height:220px;position:relative;margin-bottom:20px;"><canvas id="shareholder-chart"></canvas></div>

                            <div><div style="font-size:11px;color:var(--text-mut);font-weight:bold;">時価総額</div><b style="font-size:15px;">¥${Math.floor(target.marketCap / 10000).toLocaleString()}万</b></div>
                            <div style="grid-column:span 2;border-top:1px solid var(--border);padding-top:10px;"><div style="font-size:11px;color:var(--text-mut);font-weight:bold;">発行済株式総数</div><b style="font-size:15px;">${target.shares.toLocaleString()} 株</b></div>

                        </div>
                    </div>
                    <div style="flex:1 1 240px;display:flex;flex-direction:column;gap:12px;">
                        <div class="card" style="margin:0;padding:15px;border-left:4px solid #8b5cf6;"><h5 style="margin:0 0 10px 0;font-size:14px;">🏢 所有不動産 (${allProps.length})</h5><div style="max-height:150px;overflow-y:auto;padding-right:5px;">${propHtml}</div></div>
                        <div class="card" style="margin:0;padding:15px;border-left:4px solid var(--warning);"><h5 style="margin:0 0 10px 0;font-size:14px;">🤝 傘下企業 (${subs.length})</h5><div style="max-height:150px;overflow-y:auto;padding-right:5px;">${subHtml}</div></div>
                        <div class="card" style="margin:0;padding:15px;border-left:4px solid var(--success);"><h5 style="margin:0 0 10px 0;font-size:14px;">💼 保有株 (${portCount})</h5><div style="padding-right:5px;">${portfolioHtml}</div></div>
                    </div>
                </div>`;

                setTimeout(() => {
                    let ctx = document.getElementById('shareholder-chart');
                    if (!ctx) return;
                    ctx = ctx.getContext('2d');
                    if (window.shareholderChart) window.shareholderChart.destroy();
                    let labels = [], data = [], colors = [], totalHeld = 0;
                    let shArray = Object.keys(target.shareholders).map(k => ({ id: k, shares: target.shareholders[k] })).filter(d => d.shares > 0).sort((a, b) => b.shares - a.shares);
                    for (let i = 0; i < Math.min(shArray.length, 6); i++) {
                        let ownerCo = companies.find(c => c.id === shArray[i].id);
                        labels.push(shArray[i].id === 'player' ? '自社' : (ownerCo ? ownerCo.name.replace(/\[.*?\]\s*/, '').substring(0, 8) : shArray[i].id));
                        data.push(shArray[i].shares);
                        colors.push(shArray[i].id === 'player' ? 'var(--primary)' : (ownerCo ? ownerCo.color : '#94a3b8'));
                        totalHeld += shArray[i].shares;
                    }
                    if (target.shares > totalHeld) { labels.push('一般流通'); data.push(target.shares - totalHeld); colors.push('#e2e8f0'); }
                    window.shareholderChart = new Chart(ctx, {
                        type: 'doughnut', data: { labels, datasets: [{ data, backgroundColor: colors, borderWidth: 2, borderColor: '#fff' }] },

                    });
                }, 50);

            } else if (tab === 'finance') {

                let _tdTotal0 = (target.termDeposits || []).reduce((s, td) => s + td.amount, 0);
                let _debt0 = Object.values(target.bankDebts || {}).reduce((s, v) => s + v, 0);

                // 収益: lastRevenue（週次累積）優先、リセット直後は前期値、それ以外はqNetから推定
                let revenue, expense, profit;
                if (target.lastRevenue > 0) {
                    revenue = target.lastRevenue;
                    expense = target.lastExpense || Math.floor(revenue * 0.75);
                    profit = target.lastProfit || (revenue - expense);
                } else if (target.prevLastRevenue > 0) {
                    // 四半期リセット直後: 前期確定値を使用
                    revenue = target.prevLastRevenue;
                    expense = target.prevLastExpense || Math.floor(revenue * 0.75);
                    profit = target.prevLastProfit || (revenue - expense);
                } else if (target.lastQProfit > 0) {
                    // 旧データ: 純利益から粗収益を逆算（セクター別利益率）
                    let _margin = { bank: 0.70, re: 0.55, ins: 0.40, sogo: 0.60, log: 0.40, it: 0.55, coffee: 0.15, ad: 0.70 }[target.sector] || 0.25;
                    profit = target.lastQProfit;
                    revenue = Math.floor(profit / _margin);
                    expense = revenue - profit;
                } else {
                    // フォールバック: 時価総額ベース推定
                    revenue = Math.max(1, target.marketCap * 0.002);
                    expense = Math.floor(revenue * 0.75);
                    profit = revenue - expense;
                }

                // 実際の総資産 = 現金 + 普通預金 + 定期預金 + 株式保有評価 + 不動産
                let _stockVal0 = 0;
                if (target.shareholders) {

                        let held = companies.find(x => x.id === sid);

                    }
                }
                let assets = Math.max(
                    target.cash + _depTotal0 + _tdTotal0 + _stockVal0,
                    target.marketCap * 0.5
                );
                let debt = _debt0;
                let depTotal = _depTotal0;
                let equity = Math.max(0, assets - debt);

                // ブロック図ビルダー（インライン版）
                const buildBlock = (leftBlocks, rightBlocks, lTitle, rTitle) => {
                    const total = Math.max(
                        leftBlocks.reduce((s, b) => s + b.val, 0),
                        rightBlocks.reduce((s, b) => s + b.val, 0)
                    ) || 1;
                    const side = (blocks, title) => {
                        const rows = blocks.map(b => {
                            const show = b.val / total > 0.1;
                            return `<div style="flex:${Math.max(b.val, 1)};background:${b.color};border-radius:5px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2px;overflow:hidden;min-height:16px;">
                                ${show ? `<div style="font-size:9px;font-weight:700;color:#0a0a0f;text-align:center;line-height:1.2;">${b.label}</div><div style="font-size:8px;color:#0a0a0f;opacity:0.75;">¥${f(b.val)}</div>` : ''}
                            </div>`;
                        }).join('');
                        return `<div style="flex:1;display:flex;flex-direction:column;">
                            <div style="font-size:9px;color:#64748b;text-align:center;margin-bottom:3px;">${title}</div>
                            <div style="display:flex;flex-direction:column;gap:2px;height:150px;">${rows}</div>
                        </div>`;
                    };
                    return `<div style="display:flex;gap:4px;">${side(leftBlocks, lTitle)}${side(rightBlocks, rTitle)}</div>`;
                };

                const plLeft = [{ label: '純利益', val: Math.max(0, profit), color: '#4ade80' }, { label: '費用', val: Math.max(0, expense), color: '#f87171' }];
                const plRight = [{ label: '収益', val: Math.max(1, revenue), color: '#60a5fa' }];
                const bsLeft = [{ label: '現金・預金', val: target.cash + depTotal, color: '#4ade80' }, { label: 'その他資産', val: Math.max(0, assets - target.cash - depTotal), color: '#60a5fa' }];
                const bsRight = [{ label: '負債', val: Math.max(0, debt), color: '#f87171' }, { label: '資本', val: Math.max(1, equity - profit), color: '#60a5fa' }, { label: '当期利益', val: Math.max(0, profit), color: '#4ade80' }];

                // 銀行金利情報（bankセクターのみ）
                let bankRateHtml = '';
                if (target.sector === 'bank') {
                    // 流動性情報
                    let _custody = target._custodyTotal || 0;
                    let _liqRatio = _custody > 0 ? (target.cash / _custody * 100).toFixed(1) : '—';
                    let _liqColor = _custody > 0 && target.cash / _custody < 0.10 ? 'var(--danger)' : (_custody > 0 && target.cash / _custody < 0.20 ? 'var(--warning)' : 'var(--success)');
                    bankRateHtml = `<div style="background:#f9fafb;border-radius:10px;padding:12px;margin-bottom:14px;border:1px solid #e2e8f0;">
                        <div style="font-size:10px;color:#64748b;margin-bottom:8px;letter-spacing:1px;font-weight:700;">🏦 銀行経営指標</div>
                        <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px;font-size:12px;">
                            <div style="background:#fff;border-radius:6px;padding:8px;border:1px solid #e2e8f0;">
                                <div style="color:#64748b;font-size:10px;margin-bottom:2px;">預かり総額（受託残高）</div>
                                <div style="font-weight:900;">¥${Math.floor(_custody/10000).toLocaleString()}万</div>
                            </div>
                            <div style="background:#fff;border-radius:6px;padding:8px;border:1px solid #e2e8f0;">
                                <div style="color:#64748b;font-size:10px;margin-bottom:2px;">流動性比率</div>
                                <div style="font-weight:900;color:${_liqColor};">${_liqRatio}%</div>
                                <div style="font-size:9px;color:#94a3b8;">（危険水準: 10%未満）</div>
                            </div>
                        </div>
                        <div style="font-size:10px;color:#64748b;margin-bottom:8px;letter-spacing:1px;font-weight:700;">金利情報</div>
                        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;">
                            ${[
                            { label: '普通預金', val: `+${((target.depositRate || 0) * 100).toFixed(3)}%`, color: '#16a34a' },
                            { label: '定期預金', val: `+${((target.termDepositRate || 0) * 100).toFixed(3)}%`, color: '#d97706' },
                            { label: '借入金利', val: `-${((target.loanRate || 0) * 100).toFixed(3)}%`, color: '#dc2626' },
                        ].map(r => `<div style="text-align:center;background:#fff;border-radius:8px;padding:8px 4px;border:1px solid #e2e8f0;">
                                <div style="font-size:9px;color:#64748b;margin-bottom:2px;">${r.label}</div>
                                <div style="font-size:13px;font-weight:900;color:${r.color};">${r.val}</div>
                                <div style="font-size:8px;color:#94a3b8;">週次</div>
                            </div>`).join('')}
                        </div>
                    </div>`;
                }

                document.getElementById('company-modal-desc').innerHTML = `
                ${bankRateHtml}
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
                    <div>
                        <div style="font-size:11px;color:#64748b;margin-bottom:8px;font-weight:700;letter-spacing:1px;">📋 損益ブロック図</div>
                        ${buildBlock(plLeft, plRight, '費用・利益', '収益')}
                        <div style="margin-top:10px;background:#f9fafb;border-radius:10px;padding:12px;border:1px solid #e2e8f0;">
                            ${[
                        { label: '収益', val: revenue, color: '#16a34a' },
                        { label: '費用', val: -expense, color: '#dc2626' },
                        { label: '純利益', val: profit, color: '#2563eb', bold: true, top: true },
                    ].map(r => `<div style="display:flex;justify-content:space-between;padding:${r.top ? '8px 0 0 0;border-top:1px dashed #cbd5e1;margin-top:4px' : '5px 0'};font-size:${r.bold ? 13 : 12}px;">
                                <span style="color:#64748b;font-weight:${r.bold ? 700 : 400};">${r.label}</span>
                                <span style="font-weight:800;color:${r.color};">${r.val >= 0 ? '+' : ''}¥${f(Math.abs(r.val))}</span>
                            </div>`).join('')}
                        </div>
                    </div>
                    <div>
                        <div style="font-size:11px;color:#64748b;margin-bottom:8px;font-weight:700;letter-spacing:1px;">🏦 貸借対照ブロック図</div>
                        ${buildBlock(bsLeft, bsRight, '資産', '負債・純資産')}
                        <div style="margin-top:10px;background:#f9fafb;border-radius:10px;padding:12px;border:1px solid #e2e8f0;">
                            ${[
                        { label: '総資産', val: assets, color: '#2563eb' },
                        { label: '負債', val: debt, color: '#dc2626' },
                        { label: '純資産', val: equity, color: '#16a34a', bold: true, top: true },
                    ].map(r => `<div style="display:flex;justify-content:space-between;padding:${r.top ? '8px 0 0 0;border-top:1px dashed #cbd5e1;margin-top:4px' : '5px 0'};font-size:${r.bold ? 13 : 12}px;">
                                <span style="color:#64748b;font-weight:${r.bold ? 700 : 400};">${r.label}</span>
                                <span style="font-weight:800;color:${r.color};">¥${f(Math.abs(r.val))}</span>
                            </div>`).join('')}
                            <div style="margin-top:8px;border-top:1px dashed #cbd5e1;padding-top:8px;">
                                <div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px;">
                                    <span style="color:#64748b;">自己資本比率</span>
                                    <span style="font-weight:800;color:#16a34a;">${assets > 0 ? (equity / assets * 100).toFixed(1) : 0}%</span>
                                </div>
                                <div style="height:5px;background:#e2e8f0;border-radius:999px;overflow:hidden;">
                                    <div style="height:100%;width:${assets > 0 ? Math.min(100, (equity / assets * 100).toFixed(1)) : 0}%;background:linear-gradient(90deg,#4ade80,#60a5fa);border-radius:999px;"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>`;
            } else if (tab === 'group') {
                // ── グループツリータブ ──
                // グループのルート企業を探す
                function _findRoot(co) {
                    let visited = new Set();
                    let cur = co;
                    while (cur.parent && cur.parent !== 'player') {
                        if (visited.has(cur.id)) break;
                        visited.add(cur.id);
                        let par = companies.find(cx => cx.id === cur.parent);
                        if (!par) break;
                        cur = par;
                    }
                    return cur;
                }

                // ツリーノードHTMLを再帰生成
                function _buildTreeNode(co, currentId, depth, _visited) {
                    if (!_visited) _visited = new Set();
                    if (_visited.has(co.id)) return '';
                    _visited.add(co.id);
                    let isCurrent = co.id === currentId;
                    let cleanName = co.name.replace(/\[.*?\]\s*/g, '');
                    let badge = window.getCountryBadge ? window.getCountryBadge(co.country) : '';
                    let sectorLabel = sectors[co.sector]?.n || '';
                    let cap = co.marketCap >= 1e8 ? (co.marketCap / 1e8).toFixed(1) + '億' : Math.floor(co.marketCap / 1e4).toLocaleString() + '万';
                    let playerOwn = co.shareholders && co.shareholders['player'] ? ((co.shareholders['player'] / co.shares) * 100).toFixed(1) : '0';

                    // 子会社を取得（直接子のみ）
                    let children = companies.filter(cx =>
                        (cx.parent === co.id) ||
                        (!cx.parent && cx.shareholders && cx.shareholders[co.id] && (cx.shareholders[co.id] / Math.max(1, cx.shares)) > 0.5)
                    );

                    // 現在の企業ハイライト色
                    let bgColor = isCurrent ? 'linear-gradient(135deg,#eff6ff,#dbeafe)' : '#fff';
                    let borderColor = isCurrent ? '#2563eb' : '#e2e8f0';
                    let leftBorder = isCurrent ? '4px solid #2563eb' : '2px solid #e2e8f0';

                    // クリックアクション: 株式取引画面に飛ぶ or 詳細開く
                    let onclick = co.isPublic
                        ? `window._companyModalTab='profile'; closeModal('company-modal'); window._marketSelectedId='${co.id}'; currentMarketSector='${co.sector}'; document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active')); document.getElementById('nav-market')?.classList.add('active'); document.querySelectorAll('.view-section').forEach(v=>v.classList.remove('active')); document.getElementById('view-market')?.classList.add('active'); updateMarket();`
                        : `window._companyModalTab='profile'; openCompanyModal('${co.id}');`;

                    let nodeHtml = `
                    <div style="margin-left:${depth * 20}px; margin-bottom:8px;">
                        ${depth > 0 ? `<div style="margin-left:-10px; border-left:2px dashed #cbd5e1; height:12px; width:12px; border-bottom:2px dashed #cbd5e1; display:inline-block; margin-right:4px; vertical-align:middle; margin-bottom:-4px;"></div>` : ''}
                        <div onclick="${onclick}"
                             style="display:inline-flex; align-items:center; gap:10px; background:${bgColor};
                                    border:1px solid ${borderColor}; border-left:${leftBorder};
                                    border-radius:10px; padding:10px 14px; cursor:pointer;
                                    box-shadow:${isCurrent ? '0 2px 8px rgba(37,99,235,0.2)' : '0 1px 3px rgba(0,0,0,0.05)'};
                                    transition:0.15s; width:calc(100% - ${depth * 20}px - 20px); box-sizing:border-box;">
                            <div style="font-size:20px; flex-shrink:0;">${co.icon || '🏢'}</div>
                            <div style="flex:1; min-width:0;">
                                <div style="display:flex; align-items:center; gap:4px; flex-wrap:wrap; margin-bottom:2px;">
                                    ${isCurrent ? '<span style="font-size:9px;background:#2563eb;color:#fff;padding:1px 5px;border-radius:4px;font-weight:900;">👁 表示中</span>' : ''}
                                    <span style="font-size:9px;background:#f1f5f9;color:#64748b;padding:1px 5px;border-radius:4px;">${sectorLabel}</span>
                                    ${parseFloat(playerOwn) > 0 ? `<span style="font-size:9px;background:#dcfce7;color:#166534;padding:1px 5px;border-radius:4px;font-weight:900;">自社 ${playerOwn}%</span>` : ''}
                                    ${(() => { let _tp2 = companyTypeProfiles[co.personality]; return _tp2 ? `<span style="font-size:9px;padding:1px 5px;border-radius:4px;font-weight:900;background:${_tp2.color}22;color:${_tp2.color};">${_tp2.label}</span>` : ''; })()}
                                </div>
                                <div style="font-weight:900; font-size:14px; color:#1e293b; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${badge} ${cleanName}</div>
                                <div style="font-size:11px; color:#64748b; margin-top:2px;">株価 ¥${co.stockPrice.toLocaleString()} / 時価総額 ¥${cap}</div>
                            </div>
                            ${co.isPublic ? '<div style="font-size:16px; flex-shrink:0; color:#94a3b8;">📈</div>' : '<div style="font-size:16px; flex-shrink:0; color:#94a3b8;">🔒</div>'}
                        </div>
                    </div>`;

                    // 再帰で子を描画
                    children.forEach(child => {
                        nodeHtml += _buildTreeNode(child, currentId, depth + 1, _visited);
                    });

                    return nodeHtml;
                }

                let root = _findRoot(target);
                let isStandalone = !target.parent && companies.filter(cx =>
                    cx.parent === target.id ||
                    (cx.shareholders && cx.shareholders[target.id] && (cx.shareholders[target.id] / (cx.shares || 1)) > 0.5)
                ).length === 0;

                let groupTitle = isStandalone
                    ? `${root.name.replace(/\[.*?\]\s*/g, '')}（独立企業）`
                    : `${root.name.replace(/\[.*?\]\s*/g, '')} グループ`;

                document.getElementById('company-modal-desc').innerHTML = `
                <div style="margin-bottom:16px;">
                    <div style="font-size:11px;color:#64748b;font-weight:700;letter-spacing:1px;margin-bottom:6px;">🏢 ${groupTitle}</div>
                    <div style="font-size:11px;color:#94a3b8;margin-bottom:12px;">📈 マークをクリックすると株式取引画面へ移動します</div>
                    <div style="padding:4px 0;">
                        ${_buildTreeNode(root, cid, 0)}
                    </div>
                </div>`;
            }

            modal.style.display = 'flex';
        };

        // ==========================================
        // 💰 補完：資産詳細モーダル
        // ==========================================
        // ── 財務ダッシュボード共通ユーティリティ ──
        window._fmtAsset = function (n) {
            if (Math.abs(n) >= 1e12) return (n / 1e12).toFixed(1) + '兆';
            if (Math.abs(n) >= 1e8) return (n / 1e8).toFixed(1) + '億';
            if (Math.abs(n) >= 1e4) return (n / 1e4).toFixed(0) + '万';
            return n.toLocaleString();
        };

        window._buildBlockChart = function (leftBlocks, rightBlocks, leftTitle, rightTitle) {
            const total = Math.max(
                leftBlocks.reduce((s, b) => s + b.val, 0),
                rightBlocks.reduce((s, b) => s + b.val, 0)
            );
            const side = (blocks, title) => {
                const rows = blocks.map(b => {
                    const pct = (b.val / total * 100).toFixed(1);
                    const showLabel = b.val / total > 0.07;
                    return `<div style="flex:${b.val};background:${b.color};border-radius:5px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2px;overflow:hidden;min-height:18px;">
                        ${showLabel ? `<div style="font-size:9px;font-weight:700;color:#0a0a0f;text-align:center;line-height:1.2;">${b.label}</div><div style="font-size:8px;color:#0a0a0f;opacity:0.8;">¥${window._fmtAsset(b.val)}</div>` : ''}
                    </div>`;
                }).join('');
                return `<div style="display:flex;flex-direction:column;gap:0;">
                    <div style="font-size:10px;color:#94a3b8;text-align:center;margin-bottom:4px;">${title}</div>
                    <div style="display:flex;flex-direction:column;gap:2px;height:200px;">${rows}</div>
                </div>`;
            };
            return `<div style="display:grid;grid-template-columns:1fr 1fr;gap:4px;">${side(leftBlocks, leftTitle)}${side(rightBlocks, rightTitle)}</div>`;
        };

        window._pfDashTab = 'overview';

        window.openPortfolioDetailModal = function (tabOverride) {
            if (tabOverride) window._pfDashTab = tabOverride;
            let p = companies[0];

            // ── データ集計 ──
            let stockVal = 0, stockGain = 0;
            companies.forEach(c => {
                if (c.id !== 'player' && (c.shareholders['player'] || 0) > 0) {
                    let val = c.stockPrice * c.shareholders['player'];
                    stockVal += val;
                    stockGain += val - (c.playerTotalCost || 0);
                }
            });
            let propVal = 0, propCount = 0, rentInc = 0;
            ownedProperties.forEach(prop => {
                if (prop.owner === 'player') {
                    propVal += prop.currentValue || 0; propCount++;
                    let mp = globalNetworkData[prop.rk]?.districts.find(d => d.name === prop.distName)?.properties[prop.idx];
                    if (mp) { rentInc += mp.rent * (mp.occupiedNPCSlots || 0); if (mp.coffeeTenant && mp.coffeeTenant !== 1) rentInc += mp.rent; }
                }
            });
            let vcVal = 0;
            (vcMarket || []).forEach(vc => { if (vc.investors && vc.investors['player'] > 0) vcVal += vc.investors['player']; });
            let depTotal = Object.values(p.deposits || {}).reduce((s, v) => s + v, 0);
            let tdTotal = (p.termDeposits || []).reduce((s, td) => s + td.amount, 0);
            let debtTotal = Object.values(p.bankDebts || {}).reduce((s, v) => s + v, 0);
            let totalAssets = p.cash + depTotal + tdTotal + stockVal + propVal + vcVal;
            let prevTotal = window._prevTotalAssets || totalAssets;
            window._prevTotalAssets = totalAssets;
            let assetDiff = totalAssets - prevTotal;

            // 週次収支
            let wInc = (window.playerPreviousProfit || 0) > 0 ? window.playerPreviousProfit : 0;
            let wExp = 0;
            let wNet = window.playerPreviousProfit || 0;
            // P/L詳細
            let storeSales = p.stores.reduce((s, st) => s + (st.sales || 0), 0);
            let staffCost = p.stores.reduce((s, st) => s + ((st.staffCount || 1) * 50000 + (st.hasManager && st.managerData ? st.managerData.baseSalary : 0)), 0);
            let rentCost = p.stores.reduce((s, st) => s + (st.rent || 0), 0);
            let intCost = Math.floor(debtTotal * (p.mainBankId ? (companies.find(b => b.id === p.mainBankId)?.loanRate || 0.005) : 0.005));
            let revenue = storeSales + rentInc + wNet * 0.2; // 概算
            let netIncome = wNet;
            let tax = Math.max(0, Math.floor(netIncome * 0.2));

            // B/S
            let bsAssets = p.cash + depTotal + tdTotal + stockVal + propVal;
            let equity = bsAssets - debtTotal;

            const f = window._fmtAsset;
            const tab = window._pfDashTab;

            // ── タブコンテンツ ──
            let tabContent = '';

            if (tab === 'overview') {
                const bars = [
                    { key: 'cash', label: '手元資金', val: p.cash, color: '#4ade80' },
                    { key: 'dep', label: '普通預金', val: depTotal, color: '#60a5fa' },
                    { key: 'td', label: '定期預金', val: tdTotal, color: '#f59e0b' },
                    { key: 'stock', label: '株式', val: stockVal, color: '#a78bfa' },
                    { key: 're', label: '不動産', val: propVal, color: '#fb923c' },
                ];
                const barsTotal = bars.reduce((s, b) => s + b.val, 0) || 1;
                const barHtml = bars.map(b => `<div style="flex:${b.val / barsTotal};background:${b.color};border-radius:999px;min-width:2px;"></div>`).join('');
                const legendHtml = bars.map(b => `<div style="display:flex;align-items:center;gap:4px;">
                    <div style="width:8px;height:8px;border-radius:2px;background:${b.color};flex-shrink:0;"></div>
                    <span style="font-size:10px;color:#94a3b8;">${b.label}</span>
                    <span style="font-size:11px;font-weight:700;">¥${f(b.val)}</span>
                </div>`).join('');
                const cards = [
                    { icon: '💰', title: '流動資産', sub: '手元+普通預金', val: p.cash + depTotal, color: '#4ade80', note: `定期: ¥${f(tdTotal)}` },
                    { icon: '📈', title: '株式', sub: `含み${stockGain >= 0 ? '益+' : '損'}¥${f(Math.abs(stockGain))}`, val: stockVal, color: '#a78bfa', note: `${Object.keys(p.shareholders || {}).filter(k => k !== 'player' && (companies.find(c => c.id === k)?.shareholders?.player || 0) > 0).length}社` },
                    { icon: '🏢', title: '不動産', sub: `週家賃+¥${f(rentInc)}`, val: propVal, color: '#fb923c', note: `${propCount}件` },
                    { icon: '🏦', title: '負債', sub: `週利息-¥${f(intCost)}`, val: debtTotal, color: '#f87171', note: `${(debtTotal / totalAssets * 100).toFixed(1)}%` },
                ];
                const cardsHtml = cards.map(c => `<div style="background:#111118;border-radius:12px;padding:13px;border:1px solid ${c.color}22;">
                    <div style="display:flex;justify-content:space-between;margin-bottom:7px;">
                        <span style="font-size:17px;">${c.icon}</span>
                        <span style="font-size:10px;color:#64748b;background:#1e293b;padding:2px 7px;border-radius:999px;">${c.note}</span>
                    </div>
                    <div style="font-size:10px;color:#64748b;margin-bottom:2px;">${c.title}</div>
                    <div style="font-size:18px;font-weight:900;color:${c.color};">¥${f(c.val)}</div>
                    <div style="font-size:10px;color:#94a3b8;margin-top:3px;">${c.sub}</div>
                </div>`).join('');
                const cfHtml = [
                    { label: '収入', val: Math.max(0, wNet + staffCost + rentCost + intCost), color: '#4ade80', sign: '+' },
                    { label: '支出', val: staffCost + rentCost + intCost, color: '#f87171', sign: '-' },
                    { label: '純利益', val: wNet, color: '#60a5fa', sign: wNet >= 0 ? '+' : '-' },
                ].map(cf => `<div style="text-align:center;background:#0a0a0f;border-radius:8px;padding:10px 6px;">
                    <div style="font-size:10px;color:#64748b;margin-bottom:4px;">${cf.label}</div>
                    <div style="font-size:13px;font-weight:800;color:${cf.color};">${cf.sign}¥${f(Math.abs(cf.val))}</div>
                </div>`).join('');

                tabContent = `
                <div style="background:#111118;border-radius:12px;padding:15px;margin-bottom:13px;border:1px solid #1e1b4b;">
                    <div style="font-size:10px;color:#64748b;margin-bottom:10px;letter-spacing:1px;">資産構成</div>
                    <div style="display:flex;height:10px;border-radius:999px;overflow:hidden;gap:2px;margin-bottom:13px;">${barHtml}</div>
                    <div style="display:flex;flex-wrap:wrap;gap:6px 16px;">${legendHtml}</div>
                </div>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:13px;">${cardsHtml}</div>
                <div style="background:#111118;border-radius:12px;padding:15px;border:1px solid #1e1b4b;">
                    <div style="font-size:10px;color:#64748b;margin-bottom:10px;letter-spacing:1px;">週次キャッシュフロー</div>
                    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;">${cfHtml}</div>
                </div>`;
            }

            else if (tab === 'stocks') {
                // 保有株一覧
                let holdings = companies.filter(c => c.id !== 'player' && (c.shareholders['player'] || 0) > 0 && c.isPublic);
                if (holdings.length === 0) {
                    tabContent = `<div style="text-align:center;padding:40px;color:#64748b;font-size:14px;">保有株式なし</div>`;
                } else {
                    // セクター別にグループ化
                    let bySector = {};
                    holdings.forEach(c => {
                        let s = c.sector;
                        if (!bySector[s]) bySector[s] = [];
                        bySector[s].push(c);
                    });
                    let totalStockVal = 0, totalGain = 0;
                    holdings.forEach(c => {
                        let o = c.shareholders['player'] || 0;
                        totalStockVal += c.stockPrice * o;
                        totalGain += c.stockPrice * o - (c.playerTotalCost || 0);
                    });
                    let gainColor = totalGain >= 0 ? '#4ade80' : '#f87171';
                    let gainSign = totalGain >= 0 ? '+' : '';

                    let sectorHtml = Object.keys(bySector).map(s => {
                        let rows = bySector[s].map(c => {
                            let o = c.shareholders['player'] || 0;
                            let mktVal = c.stockPrice * o;
                            let gain = mktVal - (c.playerTotalCost || 0);
                            let gainPct = (c.playerTotalCost || 0) > 0 ? (gain / (c.playerTotalCost || 1)) * 100 : 0;
                            let gc = gain >= 0 ? '#4ade80' : '#f87171';
                            let gs = gain >= 0 ? '+' : '';
                            let pct = ((o / c.shares) * 100).toFixed(1);
                            let badge = window.getCountryBadge ? window.getCountryBadge(c.country) : '';
                            let hist = (stockHistory.datasets?.[c.id]) || [c.stockPrice];
                            let prevP = hist.length > 1 ? hist[hist.length - 2] : c.stockPrice;
                            let wkPct = prevP > 0 ? ((c.stockPrice - prevP) / prevP) * 100 : 0;
                            let wkColor = wkPct >= 0 ? '#4ade80' : '#f87171';
                            let wkSign = wkPct >= 0 ? '+' : '';
                            let divPs = (c.id !== 'player' && c.dividendRate > 0 && c.lastQProfit > 0)
                                ? Math.floor((c.lastQProfit * (c.dividendRate / 100)) / c.shares) : 0;
                            let annualDiv = divPs * o * 4; // 四半期×4
                            return `
                            <div onclick="closeModal('portfolio-detail-modal');currentMarketSector='${c.sector}';window._marketSelectedId='${c.id}';switchTab('market');updateMarket();" style="padding:12px 14px;border-bottom:1px solid #1e1b4b;cursor:pointer;display:flex;align-items:center;gap:10px;">
                                <div style="flex:1;min-width:0;">

                                    <div style="font-size:10px;color:#64748b;margin-top:2px;">${o.toLocaleString()}株 (${pct}%) ・ 前週 <span style="color:${wkColor};font-weight:700;">${wkSign}${wkPct.toFixed(1)}%</span></div>
                                </div>
                                <div style="text-align:right;flex-shrink:0;">
                                    <div style="font-size:13px;font-weight:900;color:#e2e8f0;">¥${f(mktVal)}</div>
                                    <div style="font-size:11px;font-weight:700;color:${gc};">${gs}${gainPct.toFixed(1)}% (${gs}¥${f(Math.abs(gain))})</div>
                                    ${annualDiv > 0 ? `<div style="font-size:10px;color:#fbbf24;">配当 ¥${f(annualDiv)}/年</div>` : ''}
                                </div>
                            </div>`;

                        </div>
                        <div style="text-align:right;">
                            <div style="font-size:10px;color:#64748b;margin-bottom:3px;">含み損益</div>
                            <div style="font-size:18px;font-weight:900;color:${gainColor};">${gainSign}¥${f(Math.abs(totalGain))}</div>
                            <div style="font-size:11px;color:${gainColor};">${gainSign}${totalStockVal > 0 ? (totalGain / totalStockVal * 100).toFixed(1) : 0}%</div>
                        </div>
                    </div>
                    ${sectorHtml}`;
                }
            }

            else if (tab === 'pl') {
                const plLeft = [
                    { label: '純利益', val: Math.max(0, netIncome), color: '#4ade80' },

                const plRight = [{ label: '収益', val: Math.max(1, revenue), color: '#60a5fa' }];
                const rows = [
                    { label: '売上高', val: revenue, indent: 0, bold: true },
                    { label: '└ 店舗売上', val: storeSales, indent: 1, sub: true },
                    { label: '└ 家賃収入', val: rentInc, indent: 1, sub: true },
                    { label: '└ その他', val: revenue - storeSales - rentInc, indent: 1, sub: true },
                    { label: '人件費', val: -staffCost, indent: 0 },
                    { label: '家賃コスト', val: -rentCost, indent: 0 },
                    { label: '借入金利', val: -intCost, indent: 0 },

                    <span style="font-size:${r.bold ? 14 : 12}px;font-weight:${r.bold ? 800 : 600};color:${r.val >= 0 ? '#4ade80' : '#f87171'};">${r.val >= 0 ? '+' : ''}¥${f(Math.abs(r.val))}</span>
                </div>`).join('');
                tabContent = `
                <div style="background:#111118;border-radius:12px;padding:15px;margin-bottom:13px;border:1px solid #1e1b4b;">
                    <div style="font-size:10px;color:#64748b;margin-bottom:10px;letter-spacing:1px;">損益ブロック図</div>

            }

            else if (tab === 'bs') {

                const bsRight2 = [
                    { label: '負債', val: debtTotal, color: '#f87171' },
