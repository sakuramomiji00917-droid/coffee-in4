                    { label: '当期利益', val: Math.max(0, netIncome), color: '#4ade80' },
                ];
                const assetRows = [
                    { label: '手元資金', val: p.cash, color: '#60a5fa' },
                    { label: '普通預金', val: depTotal, color: '#60a5fa' },
                    { label: '定期預金', val: tdTotal, color: '#60a5fa' },
                    { label: '有価証券', val: stockVal, color: '#60a5fa' },
                    { label: '不動産', val: propVal, color: '#60a5fa' },
                ].map(r => `<div style="display:flex;justify-content:space-between;padding:8px 13px;border-bottom:1px solid #0f0f1a;">
                    <span style="font-size:11px;color:#94a3b8;">${r.label}</span>
                    <span style="font-size:12px;font-weight:700;color:${r.color};">¥${f(r.val)}</span>
                </div>`).join('');
                const liabRows = [
                    { label: '借入金', val: debtTotal, color: '#f87171' },
                    { label: '純資産', val: Math.max(0, equity), color: '#4ade80' },
                ].map(r => `<div style="display:flex;justify-content:space-between;padding:8px 13px;border-bottom:1px solid #0f0f1a;">
                    <span style="font-size:11px;color:#94a3b8;">${r.label}</span>
                    <span style="font-size:12px;font-weight:700;color:${r.color};">¥${f(r.val)}</span>
                </div>`).join('');
                const eqRatio = bsAssets > 0 ? (equity / bsAssets * 100).toFixed(1) : 0;
                tabContent = `
                <div style="background:#111118;border-radius:12px;padding:15px;margin-bottom:13px;border:1px solid #1e1b4b;">
                    <div style="font-size:10px;color:#64748b;margin-bottom:10px;letter-spacing:1px;">貸借対照ブロック図</div>
                    ${window._buildBlockChart(bsLeft2, bsRight2, '資産', '負債・純資産')}
                </div>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:13px;">
                    <div style="background:#111118;border-radius:12px;border:1px solid #1e1b4b;overflow:hidden;">
                        <div style="padding:11px 13px;border-bottom:1px solid #1e1b4b;font-size:13px;font-weight:800;color:#60a5fa;">資産の部</div>
                        ${assetRows}
                        <div style="display:flex;justify-content:space-between;padding:10px 13px;background:#0f0f1a;">
                            <span style="font-size:12px;font-weight:800;">合計</span>
                            <span style="font-size:13px;font-weight:900;color:#60a5fa;">¥${f(bsAssets)}</span>
                        </div>
                    </div>
                    <div style="background:#111118;border-radius:12px;border:1px solid #1e1b4b;overflow:hidden;">
                        <div style="padding:11px 13px;border-bottom:1px solid #1e1b4b;font-size:13px;font-weight:800;color:#f87171;">負債・純資産</div>
                        ${liabRows}
                        <div style="display:flex;justify-content:space-between;padding:10px 13px;background:#0f0f1a;">
                            <span style="font-size:12px;font-weight:800;">合計</span>
                            <span style="font-size:13px;font-weight:900;color:#e2e8f0;">¥${f(debtTotal + Math.max(0, equity))}</span>
                        </div>
                    </div>
                </div>
                <div style="background:#111118;border-radius:12px;padding:15px;border:1px solid #1e1b4b;">
                    <div style="display:flex;justify-content:space-between;margin-bottom:8px;">
                        <span style="font-size:12px;color:#94a3b8;">自己資本比率</span>
                        <span style="font-size:14px;font-weight:800;color:#4ade80;">${eqRatio}%</span>
                    </div>
                    <div style="height:6px;background:#1e293b;border-radius:999px;overflow:hidden;">
                        <div style="height:100%;width:${eqRatio}%;background:linear-gradient(90deg,#4ade80,#60a5fa);border-radius:999px;"></div>
                    </div>
                </div>`;
            }

            // ── モーダル組み立て ──
            const tabBtns = [['overview', '概要'], ['stocks', '保有株'], ['pl', '損益計算書'], ['bs', '貸借対照表']].map(([k, l]) => `
                <button onclick="window._pfDashTab='${k}'; openPortfolioDetailModal();"
                    style="background:none;border:none;cursor:pointer;padding:9px 16px;font-size:13px;font-weight:700;
                    color:${tab === k ? '#a78bfa' : '#64748b'};
                    border-bottom:${tab === k ? '2px solid #a78bfa' : '2px solid transparent'};
                    font-family:inherit;">${l}</button>`).join('');

            const diffColor = assetDiff >= 0 ? '#4ade80' : '#f87171';
            const diffMark = assetDiff >= 0 ? '▲' : '▼';

            const html = `
            <div style="font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;background:#0a0a0f;color:#e2e8f0;border-radius:12px;overflow:hidden;">
                <div style="background:linear-gradient(135deg,#0f0f1a 0%,#1a1030 100%);border-bottom:1px solid #1e1b4b;padding:18px 20px 0;">
                    <button onclick="closeModal('portfolio-detail-modal')" style="position:absolute;top:14px;right:16px;background:none;border:none;color:#64748b;font-size:20px;cursor:pointer;line-height:1;">✕</button>
                    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;">
                        <div>
                            <div style="font-size:10px;color:#6366f1;letter-spacing:3px;text-transform:uppercase;margin-bottom:4px;">財務ダッシュボード</div>
                            <div style="font-size:26px;font-weight:900;letter-spacing:-1px;">¥${f(totalAssets)}</div>
                            <div style="font-size:11px;margin-top:3px;color:${diffColor};">${diffMark} ${f(Math.abs(assetDiff))}（前週比）</div>
                        </div>
                        <div style="text-align:right;">
                            <div style="font-size:10px;color:#94a3b8;margin-bottom:3px;">週次純利益</div>
                            <div style="font-size:20px;font-weight:800;color:#4ade80;">${wNet >= 0 ? '+' : ''}¥${f(wNet)}</div>
                        </div>
                    </div>
                    <div style="display:flex;">${tabBtns}</div>
                </div>
                <div style="padding:16px;background:#0a0a0f;max-height:60vh;overflow-y:auto;">${tabContent}</div>
            </div>`;

            let modalsArea = document.getElementById('modals-area');
            let modal = document.getElementById('portfolio-detail-modal');
            if (!modal && modalsArea) {
                modalsArea.insertAdjacentHTML('beforeend',
                    `<div id="portfolio-detail-modal" class="modal-overlay" style="z-index:2000;padding:10px;align-items:flex-start;padding-top:60px;">
                        <div class="modal-content" style="max-width:480px;width:100%;border-radius:14px;overflow:hidden;padding:0;position:relative;background:#0a0a0f;border:1px solid #1e1b4b;max-height:90vh;display:flex;flex-direction:column;">
                            <div id="portfolio-detail-content"></div>
                        </div>
                    </div>`);
                modal = document.getElementById('portfolio-detail-modal');
            }
            document.getElementById('portfolio-detail-content').innerHTML = html;
            modal.style.display = 'flex';
        };

        // サイドバーに「資産詳細」ボタンを自動追加する処理
        setTimeout(() => {
            let cashEl = document.getElementById('disp-cash');
            if (cashEl && !document.getElementById('btn-portfolio-detail')) {
                cashEl.insertAdjacentHTML('afterend', `<button id="btn-portfolio-detail" class="btn-outline" style="width:100%; padding:8px; font-size:12px; margin-top:12px;" onclick="openPortfolioDetailModal()">📊 資産内訳を表示</button>`);
            }
        }, 1000);
        // ==========================================
        // 📈 グラフ描画機能 (Chart.js)
        // ==========================================
        window.updateCharts = function () {
            const ctx = document.getElementById('stockChart');
            if (!ctx || typeof Chart === 'undefined') return;

            if (window.myChart) {
                window.myChart.destroy();
            }

            window.myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: window.stockPriceHistory.map((_, i) => i + "週"),
                    datasets: [{
                        label: '自社 株価推移',
                        data: window.stockPriceHistory,
                        borderColor: '#2563eb', // プライマリーブルー
                        backgroundColor: 'rgba(37, 99, 235, 0.1)',
                        borderWidth: 2,
                        pointRadius: 1,
                        tension: 0.3,
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { display: false },
                        y: {
                            // Y軸の最小値・最大値を自動調整して変動をダイナミックに見せる
                            suggestedMin: Math.min(...window.stockPriceHistory) * 0.95,
                            suggestedMax: Math.max(...window.stockPriceHistory) * 1.05,
                            ticks: { font: { family: "'Inter', sans-serif", size: 10 } },
                            grid: { color: '#e2e8f0' }
                        }
                    }
                }
            });
        };

        // ==========================================
        // 🚀 ゲーム起動 ＆ タイトル画面制御
        // ==========================================
        window.onload = function () {
            initGame(); // 裏側で世界を初期化しておく
        };

        window.startNewGame = function () {
            let inputName = document.getElementById('player-company-name-input').value;
            if (inputName && inputName.trim() !== "") {
                companies[0].name = inputName;
                window.logHistory = [];
                addLog(`${inputName} を設立しました。M&Aや店舗拡大で世界一を目指しましょう！`, "success", "自社");
                updateDashboard();
            }

            let screen = document.getElementById('start-screen');
            screen.style.animation = 'fadeOut 0.5s ease-out forwards';

            // 🌟 修正：スマホの描画サボりを防ぐため、画面が「完全に消えた後(500ms後)」に中身を作る
            setTimeout(() => {
                screen.style.display = 'none';
                switchTab('stores');
                window.scrollTo(0, 0); // 念のため画面のスクロール位置も一番上にリセット
            }, 500);
        };
        window.openLoadFromStart = function () {
            document.getElementById('start-screen').style.display = 'none';
            openSaveLoadModal('load');
        };
        // ==========================================
        // 🏢 本社移転・不動産取引システム（AI企業からの賃貸・買収対応）
        // ==========================================
        window.openHQRelocateModal = function () {
            let modal = document.getElementById('hq-relocate-modal');
            if (!modal) {
                document.getElementById('modals-area').insertAdjacentHTML('beforeend', `
                    <div id="hq-relocate-modal" class="modal-overlay">
                        <div class="modal-content" style="max-width: 850px; padding: 30px;">
                            <button class="close-btn" onclick="closeModal('hq-relocate-modal')">✕</button>
                            <h2 style="margin-top:0;"><span style="font-size:28px;">🏢</span> 本社物件を探す</h2>
                            <p style="color:var(--text-mut); font-size:14px; margin-bottom:20px;">世界マップ上のビルを不動産会社から買収、または賃貸契約を結んで本社を入居させます。</p>
                            <div id="hq-region-tabs" class="region-tabs" style="margin-bottom:20px; overflow-x:auto; white-space:nowrap; padding-bottom:10px;"></div>
                            <div id="hq-prop-list" class="grid-2" style="max-height:450px; overflow-y:auto; padding-right:10px;"></div>

                    </div>
                `);
                modal = document.getElementById('hq-relocate-modal');
            }
            modal.style.display = 'flex';
            window.renderHQPropsByRegion(Object.keys(globalNetworkData)[0]);
        };

        window.renderHQPropsByRegion = function (selectedRegion) {
            document.getElementById('hq-region-tabs').innerHTML = Object.keys(globalNetworkData).map(rk => {
                return `<button class="tab-btn ${rk === selectedRegion ? 'active' : ''}" onclick="window.renderHQPropsByRegion('${rk}')">${globalNetworkData[rk].name}</button>`;
            }).join('');

            let availableProps = [];
            globalNetworkData[selectedRegion].districts.forEach(dist => {
                dist.properties.forEach((prop, idx) => {
                    // 🚨 【修正】所有者が誰であれ、コーヒー屋が入っていない「オフィス系ビル」ならリストに出す
                    if (prop.coffeeTenant === null && (prop.type.includes('ビル') || prop.type.includes('オフィス') || prop.type.includes('モール'))) {
                        availableProps.push({ distName: dist.name, prop: prop, idx: idx, rk: selectedRegion });
                    }
                });
            });

            let listArea = document.getElementById('hq-prop-list');
            if (availableProps.length > 0) {
                listArea.innerHTML = availableProps.map(item => {
                    let isOwnedByPlayer = item.prop.owner === 'player';
                    let ownerCo = item.prop.owner ? companies.find(c => c.id === item.prop.owner) : null;
                    let ownerName = isOwnedByPlayer ? "👑 自社" : (ownerCo ? ownerCo.name.replace(/\[.*?\]\s*/, '') : "独立系オーナー(NPC)");
                    let val = Math.floor(item.prop.currentValue || (item.prop.rent * 500));
                    let deposit = Math.floor(item.prop.rent * 2);

                    let actionBtn = isOwnedByPlayer
                        ? `<button class="btn-primary" style="background:var(--success); width:100%; padding:12px; margin-top:10px;" onclick="setHQProperty('${item.rk}', '${item.distName}', ${item.idx}, false)">👑 ここを自社ビル本社にする</button>`
                        : `<div style="display:flex; flex-direction:column; gap:8px; margin-top:10px;">
                            <button class="btn-primary" style="padding:12px;" onclick="buyHQProperty('${item.rk}', '${item.distName}', ${item.idx}, ${val})">🏢 買収して設立 (¥${Math.floor(val / 10000).toLocaleString()}万)</button>
                            <button class="btn-outline" style="border-color:var(--primary); color:var(--primary); padding:12px;" onclick="rentHQProperty('${item.rk}', '${item.distName}', ${item.idx})">🤝 賃貸で入居 (初期費用: ¥${Math.floor(deposit / 10000).toLocaleString()}万)</button>
                           </div>`;

                    return `
                    <div class="card" style="margin:0; padding:15px; border:1px solid ${isOwnedByPlayer ? 'var(--success)' : 'var(--border)'}; display:flex; flex-direction:column;">
                        <div style="border-bottom: 1px solid var(--border); padding-bottom: 10px; margin-bottom:10px;">
                            <strong style="font-size:16px;">${item.prop.name || item.prop.type}</strong>
                            <div style="font-size:12px; color:var(--primary); font-weight:bold; margin-top:4px;">🏢 所有: ${ownerName}</div>
                        </div>
                        <div style="font-size:13px; color:var(--text-mut); line-height:1.6; flex:1;">
                            📍 ${item.distName} | 価値: ¥${Math.floor(val / 10000).toLocaleString()}万<br>
                            💸 家賃: ¥${item.prop.rent.toLocaleString()}/週
                        </div>
                        <div style="width:100%; margin-top:10px;">${actionBtn}</div>
                    </div>`;
                }).join('');
            } else {
                listArea.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:40px; color:var(--text-mut); font-weight:bold; background:#f9fafb; border-radius:12px; border:2px dashed var(--border);">このエリアに空きオフィス物件がありません。</div>`;
            }
        };

        // 💰 買収処理（AI不動産会社に買収額が振り込まれる）
        window.buyHQProperty = function (rk, distName, idx, val) {
            let p = companies[0];

            let activeCountries = [...new Set(p.stores.map(s => _cMapC[s.regionKey]).filter(Boolean))];
            activeCountries.forEach(country => {

                        let secKey = key === 'logByCountry' ? 'log' : 'it';
                        // 同国優先、なければグローバル契約を継承
                        let globalId = key === 'logByCountry' ? p.contracts.logistics : p.contracts.it;
                        let candidates = companies.filter(c => c.sector === secKey && !c.isBankrupt);
                        let domestic = candidates.filter(c => c.country === country);
                        let pool = domestic.length > 0 ? domestic : candidates;
                        if (globalId && candidates.find(c => c.id === globalId)) {

            let itId = builderCo.id === 'player' ? companies[0].contracts?.it : builderCo._aiItCo;

                    if (contractor && builderCo.cash >= royalty) {
                        builderCo.cash -= royalty; // 建設費用とは別にロイヤリティを徴収
                        contractor.cash += royalty;
                        contractor.qNet = (contractor.qNet || 0) + royalty;
                        contractor.lastRevenue = (contractor.lastRevenue || 0) + royalty;
                        if (builderCo.id === 'player') {
                            addLog(`【出店手数料】出店コストの5% (¥${royalty.toLocaleString()}) を ${contractor.name.replace(/\[.*?\]\s*/, '')} に支払いました。`, 'normal', '財務');

                        let aiVoteHtml = '';
                        let aiYes = playerVotes; // プレイヤー票は賛成に

                            if (s < totalShares * 0.02) return; // 2%未満の株主は省略
                            countedNpcShares += s;
                            let aiCo = companies.find(x => x.id === id);
                            // 支持率: 基本50% + 筆頭株主ボーナス + 企業性格補正
                            let baseSupport = 0.50 + supportBonus;
                            if (aiCo) {
                                if (aiCo.personality === 'Conservative') baseSupport -= 0.15;
                                else if (aiCo.personality === 'Greedy') baseSupport += 0.10;
                                if ((aiCo.loyalty || 50) > 70) baseSupport += 0.10;
                                else if ((aiCo.loyalty || 50) < 30) baseSupport -= 0.15;
                            }
                            let isFor = Math.random() < Math.max(0.10, Math.min(0.90, baseSupport));
                            if (isFor) aiYes += s; else aiNo += s;
                            let aiName = aiCo ? aiCo.name.replace(/\[.*?\]\s*/, '') : id;
                            let aiFlag = aiCo && aiCo.country ? ({JP:'🇯🇵',USA:'🇺🇸',CHINA:'🇨🇳',UK:'🇬🇧',KOREA:'🇰🇷',AUS:'🇦🇺',CAN:'🇨🇦',FRA:'🇫🇷',GER:'🇩🇪',IND:'🇮🇳'}[aiCo.country]||'') : '';
                            aiVoteHtml += `<div class="flex-between" style="padding:8px 0; border-bottom:1px solid #e2e8f0; font-size:13px;">

                        // 一般流通株（大株主以外）: 提案内容に応じた支持率

                        let total = aiYes + aiNo;

                        let isPassed = yesPct > 50; // 単純過半数で可決

                        let resultArea = document.createElement('div');

                                <div class="flex-between" style="font-size:12px; font-weight:bold;">

                                <button class="btn-outline btn-large" style="margin-top:25px;" onclick="document.getElementById('voting-modal').remove(); if(typeof window.currentVoteCallback==='function') window.currentVoteCallback();">確認して次の議題へ</button>

            let execVote = (playerIsYes) => {
                document.getElementById('btn-vote-yes').style.display = 'none';
                document.getElementById('btn-vote-no').style.display = 'none';
                document.getElementById('voting-result-area').style.display = 'block';

                let finalYes = npcVotesFor + (playerIsYes ? playerVotes : 0);
                let finalNo = npcVotesAgainst + (!playerIsYes ? playerVotes : 0);
                let total = finalYes + finalNo;
                let yesPct = total > 0 ? (finalYes / total) * 100 : 50;

                setTimeout(() => {
                    document.getElementById('bar-yes').style.width = yesPct + '%';
                    document.getElementById('bar-no').style.width = (100 - yesPct) + '%';

        // ==========================================

        // 1. TOBボタンのエラー修正 ＆ 取締役会システムの導入


        window.declareTOB = function (compId) {
            let targetId = compId || window.tradingCompanyId;
            let c = companies.find(x => x.id === targetId), p = companies[0];
            if (!c) return alert("対象企業が見つかりません。画面を開き直してください。");
            if (c.parent === 'player') return alert("すでに自社の子会社です。");
            if (c.id === 'player') return;

            let premiumInput = document.getElementById('trade-tob-premium');
            let premiumPct = premiumInput ? parseInt(premiumInput.value, 10) : 30;
            if (isNaN(premiumPct) || premiumPct < 0) premiumPct = 30;
            let premiumPrice = Math.floor(c.stockPrice * (1 + (premiumPct / 100)));
            // 総発行済み株式の >50% が買収目標。所有分を引く
            let targetShares = Math.floor(c.shares * 0.500001) + 1;
            let currentOwnedShares = c.shareholders['player'] || 0;
            let sharesToBuy = Math.max(0, targetShares - currentOwnedShares);

            if (sharesToBuy <= 0) {
                c.parent = 'player';
                c.name = `👑 [自社傘下] ${c.name.replace(/\[.*?\]\s*/, '')}`;
                addLog(`【買収完了】${c.name.replace(/\[.*?\]\s*/, '')} を子会社化しました！`, 'success', 'M&A');
                closeModal('trade-modal'); updateDashboard(); return;
            }

            let totalCost = premiumPrice * sharesToBuy;
            if (p.cash < totalCost) return alert(`予想買収総額（約 ¥${Math.floor(totalCost / 10000).toLocaleString()}万）に対して手元資金が不足しています。`);

            // いきなり買収せず、取締役会（承認プロセス）を開く！
            closeModal('trade-modal');
            openBoardApprovalModal(c.id, premiumPrice, sharesToBuy, totalCost);
        };

        window.openBoardApprovalModal = function (targetId, price, sharesToBuy, totalCost) {
            let p = companies[0], target = companies.find(c => c.id === targetId);
            // 非上場：株主がいないのでCEO（プレイヤー）単独の議決権100%
            let voters;
            if (!p.isPublic || Object.keys(p.shareholders).filter(id => p.shareholders[id] > 0).length === 0) {
                voters = [{ id: 'player', shares: p.shares || 10000 }];
            } else {
                voters = Object.keys(p.shareholders).filter(id => p.shareholders[id] > 0).map(id => ({ id: id, shares: p.shareholders[id] })).sort((a, b) => b.shares - a.shares).slice(0, 5);
            }
            let totalVotes = voters.reduce((s, v) => s + v.shares, 0);
            let approveVotes = 0;
            let resultsHtml = '';

            voters.forEach(v => {
                let isPlayer = v.id === 'player';
                let ai = isPlayer ? null : companies.find(c => c.id === v.id);
                let isApprove = false; let reason = "";

                if (isPlayer) { isApprove = true; reason = "CEO提案"; }
                else {
                    let baseProb = (ai.loyalty || 50) / 100;
                    if (ai.personality === 'Conservative') { baseProb -= 0.3; reason = "「リスクが大きすぎる」"; }
                    else if (ai.personality === 'Greedy') { baseProb += 0.2; reason = "「利益拡大の好機」"; }
                    else { reason = "「戦略的価値を評価」"; }
                    if (totalCost > p.cash * 0.8) { baseProb -= 0.4; reason = "「手元資金が枯渇する」"; }

                    // プレミアムが大きいほどNPCが賛同しやすい
                    let premiumRatio = (price / Math.max(1, target.stockPrice)) - 1;
                    if (premiumRatio > 0.4) { baseProb += 0.2; reason += " (プレミアム大)"; }
                    else if (premiumRatio < 0.1) { baseProb -= 0.2; reason += " (プレミアム過小)"; }

                    isApprove = Math.random() < baseProb;
                    if (!isApprove && !reason.includes("資金") && !reason.includes("過小")) reason = "「CEOの独走は認めない」";
                }

                if (isApprove) approveVotes += v.shares;
                let name = isPlayer ? '👑 CEO (あなた)' : ai.name.replace(/\[.*?\]\s*/, '');
                let mark = isApprove ? '<span style="color:var(--success); font-weight:bold;">✅ 賛成</span>' : '<span style="color:var(--danger); font-weight:bold;">❌ 反対</span>';

                resultsHtml += `
            <div class="flex-between" style="padding:12px; border-bottom:1px solid rgba(255,255,255,0.1);">
                <div>
                    <div style="font-weight:bold;">${name} <span style="font-size:11px; color:#94a3b8;">(${((v.shares / p.shares) * 100).toFixed(1)}%)</span></div>
                    <div style="font-size:11px; color:#64748b; margin-top:4px;">${isPlayer ? '' : '理由: ' + reason}</div>
                </div>
                <div style="font-size:16px;">${mark}</div>
            </div>`;
            });

            let isPassed = approveVotes > (totalVotes / 2);
            let resultColor = isPassed ? 'var(--success)' : 'var(--danger)';
            let resultTitle = isPassed ? '決議可決 (TOB承認)' : '決議否決 (TOB棄却)';

            let modalsArea = document.getElementById('modals-area');
            let modal = document.getElementById('board-approval-modal');
            if (modal) modal.remove();

            modalsArea.insertAdjacentHTML('beforeend', `
        <div id="board-approval-modal" class="modal-overlay" style="z-index: 10030; background: rgba(0,0,0,0.9);">
            <div class="modal-content" style="max-width: 550px; background: #0f172a; color: #fff; border: 1px solid ${resultColor}; box-shadow: 0 0 30px ${isPassed ? 'rgba(16,185,129,0.3)' : 'rgba(239,68,68,0.3)'}; padding:0; overflow:hidden; display:flex; flex-direction:column; max-height:90vh;">
                <div style="display:flex; justify-content:space-between; align-items:center; border-bottom: 2px solid rgba(255,255,255,0.1); padding:16px 20px; flex-shrink:0; position:sticky; top:0; background:#0f172a; z-index:1;">
                    <h3 style="margin:0; color:#94a3b8; font-size:15px;">⚖️ 臨時取締役会：買収承認プロセス</h3>
                    <button onclick="closeModal('board-approval-modal')" style="background:rgba(255,255,255,0.15); border:none; color:#fff; font-size:18px; width:32px; height:32px; border-radius:50%; cursor:pointer; line-height:32px; text-align:center; flex-shrink:0;">✕</button>
                </div>
                <div style="padding:20px; overflow-y:auto; flex:1;">
                
                <div style="text-align:center; padding:15px; margin-bottom:20px; background:rgba(255,255,255,0.05); border-radius:8px;">
                    <div style="font-size:13px; color:#94a3b8; margin-bottom:5px;">買収対象</div>
                    <div style="font-size:20px; font-weight:900; color:var(--warning);">${target.name.replace(/\[.*?\]\s*/, '')}</div>
                    <div style="font-size:12px; margin-top:5px;">提示価格: ¥${price.toLocaleString()} / 総額: ¥${Math.floor(totalCost / 10000).toLocaleString()}万</div>
                    <div style="font-size:11px; color:var(--success); margin-top:5px; font-weight:bold;">(買付目標: 過半数到達に必要な 残り ${sharesToBuy.toLocaleString()} 株)</div>
                </div>
                <div style="background:#000; border-radius:8px; padding:10px; margin-bottom:20px;">${resultsHtml}</div>
                <div style="text-align:center; margin-bottom:25px;">
                    <div style="font-size:12px; color:#94a3b8; margin-bottom:5px;">審議結果</div>

                </div>

                ${isPassed
                    ? `<div style="display:flex; gap:10px;">
                        <button class="btn-outline btn-large" style="border-color:#64748b; color:#94a3b8; border-radius:12px; flex:1;" onclick="closeModal('board-approval-modal')">🏳️ 撤退する</button>
                        <button class="btn-primary btn-large" style="background:#059669; border-radius:12px; flex:2;" onclick="startAdvancedTOB('${target.id}', ${price}, ${sharesToBuy})">🚀 TOB（公開買付）を市場に宣言する</button>
                       </div>`
                    : `<button class="btn-outline btn-large" style="border-color:var(--danger); color:var(--danger); width:100%; border-radius:12px;" onclick="closeModal('board-approval-modal')">撤退する</button>`}
                </div><!-- /scroll area -->
            </div>
        </div>
    `);
            document.getElementById('board-approval-modal').style.display = 'flex';
        };

        window.startAdvancedTOB = function (targetId, price, sharesToBuy) {
            let target = companies.find(c => c.id === targetId);
            let p = companies[0];
            let totalCost = price * sharesToBuy;

            // ── 資金が足りない場合の緊急調達 ──
            if (p.cash < totalCost) {
                let shortfall = totalCost - p.cash;
                let fundLog = [];

                // 【Step1】保有株の売却（非戦略的銘柄から）
                let portfolio = companies.filter(t =>
                    t.id !== p.id && t.id !== targetId && t.isPublic && !t.isBankrupt &&
                    (t.shareholders[p.id] || 0) > 0 && t.parent !== 'player'
                ).sort((a, b) => (b.stockPrice * (b.shareholders[p.id]||0)) - (a.stockPrice * (a.shareholders[p.id]||0)));
                for (let t of portfolio) {
                    if (shortfall <= 0) break;
                    let sellAmt = Math.min(t.shareholders[p.id] || 0, Math.ceil(shortfall / t.stockPrice));
                    if (sellAmt > 0) {
                        let proceeds = sellAmt * t.stockPrice;
                        t.shareholders[p.id] = (t.shareholders[p.id] || 0) - sellAmt;
                        p.cash += proceeds;
                        shortfall -= proceeds;
                        fundLog.push(`保有株(${t.name.replace(/\[.*?\]\s*/,'')})売却 +¥${Math.floor(proceeds/10000).toLocaleString()}万`);
                    }
                }

                // 【Step2】メインバンクへ借入（不足額の最大60%）
                if (shortfall > 0 && banks.length > 0) {
                    let mainBank = banks.find(b => b.id === p.mainBankId) || banks[0];
                    let borrowMax = Math.min(shortfall * 0.8, mainBank.cash * 0.1, p.marketCap * 0.3);
                    let borrow = Math.floor(borrowMax);
                    if (borrow > 5000000) {
                        p.cash += borrow;
                        p.bankDebts[mainBank.id] = (p.bankDebts[mainBank.id] || 0) + borrow;
                        mainBank.cash -= borrow;
                        shortfall -= borrow;
                        fundLog.push(`${mainBank.name.replace(/\[.*?\]\s*/,'')}から借入 +¥${Math.floor(borrow/10000).toLocaleString()}万`);
                    }
                }

                // 【Step3】増資（残不足の最大50%・株価-10%）
                if (shortfall > 0 && p.isPublic) {
                    let issueAmount = Math.min(shortfall * 0.6, p.marketCap * 0.1);
                    let newShares = Math.floor(issueAmount / p.stockPrice);
                    if (newShares > 0) {
                        p.shares += newShares;
                        p.shareholders['market'] = (p.shareholders['market'] || 0) + newShares;
                        p.stockPrice = Math.max(10, Math.floor(p.stockPrice * 0.9));
                        p.cash += Math.floor(newShares * p.stockPrice);
                        shortfall -= Math.floor(newShares * p.stockPrice);
                        fundLog.push(`第三者割当増資 +¥${Math.floor(newShares * p.stockPrice/10000).toLocaleString()}万（株価-10%）`);
                    }
                }

                if (fundLog.length > 0) {
                    addLog(`【TOB資金調達】${fundLog.join(' / ')}`, 'warning', '財務');
                }
            }

            target.activeTOB_v2 = { bidder: 'player', price: price, targetShares: sharesToBuy, startWeek: week, deadline: week + 4 };
            let pPct = Math.round((price / target.stockPrice - 1) * 100);
            target.stockPrice = price;
            addLog(`【TOB開始】${target.name.replace(/\[.*?\]\s*/, '')} に対して株式公開買付を宣言しました！（プレミアム +${pPct}% / 決着まで4週間）`, 'alert', 'M&A');
            closeModal('board-approval-modal'); updateDashboard(); if (document.getElementById('view-market').classList.contains('active')) updateMarket();
        };

        // 2. ホワイトナイト乱入イベント
        window.triggerWhiteKnightEvent = function (eventData) {
            let t = eventData.target, k = eventData.knight;
            let counterPrice = Math.floor(eventData.currentPrice * 1.2);
            let modalsArea = document.getElementById('modals-area');
            let modal = document.getElementById('white-knight-modal');
            if (modal) modal.remove();

            modalsArea.insertAdjacentHTML('beforeend', `
        <div id="white-knight-modal" class="modal-overlay" style="z-index: 10040; backdrop-filter: blur(10px); background: rgba(220, 38, 38, 0.4);">
            <div class="modal-content" style="max-width: 500px; border: 4px solid var(--danger); background: #0f172a; color: #fff; box-shadow: 0 0 50px rgba(239, 68, 68, 0.8);">
                <div style="text-align:center; margin-bottom:20px;">
                    <div style="font-size:48px; margin-bottom:10px;">🚨</div>
                    <div style="font-size:16px; font-weight:900; color:var(--danger); letter-spacing:2px;">緊急事態：対抗TOB発生</div>
                </div>
                <div style="background: #000; padding:20px; border-radius:12px; margin-bottom:20px; border-left: 6px solid var(--danger);">
                    <p style="font-size:14px; line-height:1.6; margin-top:0;">買収ターゲットの <b>${t.name.replace(/\[.*?\]\s*/, '')}</b> が、<br>友好関係にある <b style="color:var(--warning); font-size:16px;">${k.name.replace(/\[.*?\]\s*/, '')}</b> に<br><b style="color:var(--danger);">救済合併を要請！</b> ホワイトナイトとして対抗TOBを宣言しました。</p>
                    <div style="margin-top:15px; padding-top:15px; border-top:1px dashed #334155;">
                        <div class="flex-between" style="font-size:13px; color:#94a3b8; margin-bottom:5px;"><span>自社の提示価格</span> <span style="text-decoration:line-through;">¥${eventData.currentPrice.toLocaleString()}</span></div>
                        <div class="flex-between" style="font-size:16px; font-weight:bold;"><span>敵の提示価格</span> <span style="color:var(--danger);">¥${counterPrice.toLocaleString()}</span></div>
                    </div>
                </div>
                <div style="display:flex; flex-direction:column; gap:10px;">
                    <button class="btn-primary btn-large" style="background:var(--danger); border-radius:12px;" onclick="resolveWhiteKnight('${t.id}', '${k.id}', ${counterPrice}, true)">💰 価格を ¥${counterPrice.toLocaleString()} に引き上げて徹底抗戦する</button>
                    <button class="btn-outline btn-large" style="border-color:#64748b; color:#94a3b8; border-radius:12px;" onclick="resolveWhiteKnight('${t.id}', '${k.id}', ${counterPrice}, false)">🏳️ 買収を断念して撤退する</button>
                </div>
            </div>
        </div>`);
            document.getElementById('white-knight-modal').style.display = 'flex';
        };

        window.resolveWhiteKnight = function (targetId, knightId, counterPrice, fightBack) {
            closeModal('white-knight-modal');
            let t = companies.find(c => c.id === targetId), k = companies.find(c => c.id === knightId), p = companies[0];
            if (!t || !t.activeTOB_v2) return;

            if (fightBack) {
                let newTotalCost = counterPrice * t.activeTOB_v2.targetShares;
                if (p.cash >= newTotalCost) {
                    t.activeTOB_v2.price = counterPrice; t.stockPrice = counterPrice;
                    addLog(`【TOB攻防】価格を ¥${counterPrice.toLocaleString()} に引き上げ、${k.name.replace(/\[.*?\]\s*/, '')} を牽制しました！`, 'warning', 'M&A');
                } else {
                    alert(`手元資金が ¥${Math.floor(newTotalCost / 10000).toLocaleString()}万 に満たないため、カウンターできません！強制撤退します。`);
                    fightBack = false;
                }
            }
            if (!fightBack) {
                t.activeTOB_v2.bidder = knightId; t.activeTOB_v2.price = counterPrice; t.stockPrice = counterPrice;
                // TOB完了: ホワイトナイトが対象を買収
                t.parent = k.id;
                t.name = `[${k.name.replace(/\[.*?\]\s*/, '')}傘下] ${t.name.replace(/\[.*?\]\s*/, '')}`;
                addLog(`【買収防衛】${t.name.replace(/\[.*?\]\s*/, '')}、友好企業 ${k.name.replace(/\[.*?\]\s*/, '')} に救済合併を要請。ホワイトナイトの対抗TOBにより買収計画が阻止された。`, 'alert', 'M&A');
                showMarketAlert('🏳 ホワイトナイト成立', 'TOB決着',
                    `<b style="color:var(--warning);">${k.name.replace(/\[.*?\]\s*/, '')}</b> があなたに代わって<br>` +
                    `<b style="color:var(--warning); font-size:18px;">${t.name.replace(/\[.*?\]\s*/, '')}</b> の買収を完了しました。<br><br>` +
                    `${t.name.replace(/\[.*?\]\s*/, '')} は今後 <b>${k.name.replace(/\[.*?\]\s*/, '')}</b> の傘下企業として活動します。`, 'info');
            }
            updateDashboard(); if (document.getElementById('view-market').classList.contains('active')) updateMarket();
        };







        // 6. 家賃スライダーの復活
        window.changeRentFromPortfolio = function (rk, distName, idx, newRent, avgRent, sliderEl) {
            let r = parseInt(newRent);
            let dist = globalNetworkData[rk]?.districts.find(d => d.name === distName);
            if (dist && dist.properties[idx]) dist.properties[idx].rent = r;
            let op = ownedProperties.find(x => x.rk === rk && x.idx === idx);
            if (op) op.rent = r;
            let valEl = document.getElementById(`port-rent-val-${idx}`);
            if (valEl) valEl.innerText = `¥${(r / 10000).toLocaleString()}万`;
            if (avgRent) {
                let ratio = r / avgRent;
                let lbl = ratio > 1.3 ? '🔴 高め' : ratio < 0.7 ? '🟢 安め' : '🟡 平均的';
                let clr = ratio > 1.3 ? 'var(--danger)' : ratio < 0.7 ? 'var(--success)' : 'var(--warning)';
                let msg = ratio > 1.3 ? 'が退去しやすい' : ratio < 0.7 ? 'が集まりやすい' : 'の出入りは安定';
                let hint = document.getElementById(`port-rent-hint-${idx}`);
                if (hint) { hint.innerText = `${lbl} — テナント${msg}`; hint.style.color = clr; }
            }
        };

        window.changeRent = function (regionKey, distName, propIndex, newRent, avgRent) {
            let dist = globalNetworkData[regionKey].districts.find(d => d.name === distName);
            if (dist && dist.properties[propIndex]) {
                let r = parseInt(newRent);
                dist.properties[propIndex].rent = r;
                // 家賃変更を入居中の店舗にも反映
                companies.forEach(function (co) {
                    if (!co.stores) return;
                    co.stores.forEach(function (st) {
                        if (st.regionKey === regionKey && st.location === distName && st.propIndex === propIndex) {
                            st.rent = r;
                        }
                    });
                });
                // IDは全ての非英数字を_に変換して一致させる
                let safeKey = (regionKey + '-' + distName + '-' + propIndex).replace(/[^a-zA-Z0-9_-]/g, '_');
                let label = document.getElementById('rent-val-' + safeKey);
                if (label) label.innerText = '¥' + (r / 10000).toLocaleString() + '万';
                if (avgRent) {
                    let ratio = r / parseInt(avgRent);
                    let rentLabel = ratio > 1.3 ? '🔴 高め' : ratio < 0.7 ? '🟢 安め' : '🟡 平均的';
                    let rentColor = ratio > 1.3 ? 'var(--danger)' : ratio < 0.7 ? 'var(--success)' : 'var(--warning)';
                    let msg = ratio > 1.3 ? 'が退去しやすい' : ratio < 0.7 ? 'が集まりやすい' : 'の出入りは安定';
                    let hint = document.getElementById('rent-hint-' + safeKey);
                    if (hint) { hint.innerText = rentLabel + ' — テナント' + msg; hint.style.color = rentColor; }
                    // ラベルも更新
                    let topLabel = document.getElementById('rent-toplabel-' + safeKey);
                    if (topLabel) { topLabel.innerText = rentLabel + ' (地区平均: ¥' + Math.floor(parseInt(avgRent) / 10000).toLocaleString() + '万)'; topLabel.style.color = rentColor; }
                }
            }
        };

        // 8. ランキングに「自社」と「傘下マーク」を表示
        window.renderRankingContent = function (type) {
            let validCos = companies.filter(c => !c.isBankrupt && (c.isPublic || c.id === 'player'));
            let html = '';
            if (type !== 'sector') {
                let sorted = [...validCos];
                if (type === 'marketCap') sorted.sort((a, b) => b.marketCap - a.marketCap);
                if (type === 'sales') sorted.sort((a, b) => (b.qNet || 0) - (a.qNet || 0));
                if (type === 'stores') sorted.sort((a, b) => (b.stores?.length || 0) - (a.stores?.length || 0));

                sorted = sorted.slice(0, 30);
                html = `<div style="max-height: 60vh; overflow-y: auto;">
                <table style="width: 100%; border-collapse: collapse; min-width: 600px;">
                <thead style="background:#f9fafb; font-size:12px; color:var(--text-mut); position:sticky; top:0; z-index:10;">
                    <tr><th style="padding:12px; text-align:left;">順位</th><th style="padding:12px; text-align:left;">企業名</th><th style="padding:12px; text-align:left;">業種</th><th style="text-align:right; padding:12px;">数値</th></tr>
                </thead><tbody>`;
                sorted.forEach((c, i) => {
                    let rankStr = i === 0 ? '🥇 1位' : i === 1 ? '🥈 2位' : i === 2 ? '🥉 3位' : `${i + 1}位`;
                    let isPlayer = c.id === 'player' ? 'background:#eff6ff; border-left: 4px solid var(--primary);' : 'border-bottom: 1px solid var(--border);';
                    let valStr = type === 'marketCap' ? '¥' + c.marketCap.toLocaleString() : type === 'sales' ? '¥' + (c.qNet || 0).toLocaleString() : (c.stores?.length || 0) + ' 店舗';
                    let _badge1 = (c.id !== 'player' && window.getCountryBadge) ? window.getCountryBadge(c.country) : '';
                    let nameDisp = c.id === 'player' ? '👑 自社 (あなた)' : _badge1 + c.name.replace(/\[.*?\]\s*/, '').replace(/<[^>]+>/g, '');
                    if (c.parent === 'player') nameDisp = '<span style="color:var(--success); font-weight:bold;">👑 [自社傘下]</span> ' + nameDisp;

                    html += `<tr style="${isPlayer} cursor:pointer; transition:0.2s;" onclick="openCompanyModal('${c.id}')">
                    <td style="padding:15px 12px; font-weight:bold; color:var(--text-mut);">${rankStr}</td>
                    <td style="padding:15px 12px; font-weight:900; font-size:15px; color:var(--text-main);">${nameDisp}</td>
                    <td style="padding:15px 12px; font-size:12px; color:var(--text-mut);">${sectors[c.sector]?.n || '不明'}</td>
                    <td style="padding:15px 12px; text-align:right; font-weight:900; color:var(--success); font-size:15px;">${valStr}</td>
                </tr>`;
                });
                html += '</tbody></table></div>';
            } else {
                window.currentRankingSector = window.currentRankingSector || 'coffee';
                let tabsHtml = `<div class="region-tabs" style="padding:15px; border-bottom:1px solid var(--border); margin:0;">`;
                Object.keys(sectors).forEach(sec => { tabsHtml += `<button class="tab-btn ${window.currentRankingSector === sec ? 'active' : ''}" onclick="window.currentRankingSector='${sec}'; renderRankingContent('sector');">${sectors[sec].n}</button>`; });
                tabsHtml += `</div>`;
                let secCos = validCos.filter(c => c.sector === window.currentRankingSector).sort((a, b) => b.marketCap - a.marketCap);
                let contentHtml = `<div style="display:flex; flex-direction:column; gap:0; max-height:50vh; overflow-y:auto;">`;
                if (secCos.length > 0) {
                    secCos.forEach((c, index) => {
                        let rankStr = index === 0 ? '🥇' : index === 1 ? '🥈' : index === 2 ? '🥉' : `${index + 1}`;
                        let isPlayer = c.id === 'player' ? 'background:#fffbeb; border-left: 4px solid var(--warning);' : 'border-bottom:1px solid var(--border);';
                        let _badge2 = (c.id !== 'player' && window.getCountryBadge) ? window.getCountryBadge(c.country) : '';
                        let nameDisp = c.id === 'player' ? '👑 自社' : _badge2 + c.name.replace(/\[.*?\]\s*/, '').replace(/<[^>]+>/g, '');
                        if (c.parent === 'player') nameDisp = '<span style="color:var(--success); font-weight:bold;">👑 [自社傘下]</span> ' + nameDisp;
                        contentHtml += `<div style="padding:15px; display:flex; justify-content:space-between; align-items:center; ${isPlayer} cursor:pointer;" onclick="openCompanyModal('${c.id}')">
                            <div style="display:flex; align-items:center; gap:15px;"><span style="font-weight:900; color:var(--text-mut); width:30px; text-align:center;">${rankStr}</span><span style="font-weight:900; font-size:16px;">${nameDisp}</span></div>
                            <div style="font-weight:900; color:var(--success); font-size:15px;">¥${c.marketCap.toLocaleString()}</div>
                        </div>`;

                    });
                } else { contentHtml += `<p style="color:var(--text-mut); text-align:center; padding: 30px; font-weight:bold;">この業種に上場企業はありません。</p>`; }
                contentHtml += `</div>`; html = tabsHtml + contentHtml;
            }
            document.getElementById('ranking-modal-content').innerHTML = html;
        };
        window.executeCompanyDilution = function (c, percent) {
            let dilutionRate = percent / 100;
            let newShares = Math.floor(c.shares * dilutionRate);
            let raisedCash = newShares * c.stockPrice;
            let oldPct = ((c.shareholders['player'] || 0) / c.shares) * 100;

            c.shares += newShares;
            c.cash += raisedCash;
            c.lastDilutionWeek = week;

            let newPct = ((c.shareholders['player'] || 0) / c.shares) * 100;

            addLog(`【公募増資】${c.name.replace(/\[.*?\]\s*/, '')}が新株を ${newShares.toLocaleString()}株 発行！市場から ¥${Math.floor(raisedCash / 10000).toLocaleString()}万 を調達しました。`, 'alert', '財務');
            if (c.shareholders['player'] > 0) {
                addLog(`【株式希薄化】増資により、あなたの持株比率が ${oldPct.toFixed(1)}% から ${newPct.toFixed(1)}% に低下しました。`, 'warning', 'M&A');
            }

            if (c.activeTOB_v2) {
                let currentBidderShares = c.shareholders[c.activeTOB_v2.bidder] || 0;
                c.activeTOB_v2.targetShares = Math.max(0, Math.floor((window.getFloatShares ? window.getFloatShares(c) : c.shares) * 0.51) + 1 - currentBidderShares);
            }
        };
        // ==========================================
        // 👔 店長名簿（バグ修正：未実装だったため追加）
        // ==========================================
        window.openManagerRoster = function () {
            let p = companies[0];
            let modalsArea = document.getElementById('modals-area');
            let old = document.getElementById('manager-roster-modal');
            if (old) old.remove();

            let managedStores = p.stores.filter(s => s.hasManager && s.managerData);
            let emptyStores = p.stores.filter(s => !s.hasManager);

            let makeStars = (val) =>
                '<span style="color:#f59e0b; letter-spacing:2px;">' + '★'.repeat(Math.max(0, val)) + '</span>' +
                '<span style="color:#e2e8f0; letter-spacing:2px;">' + '★'.repeat(Math.max(0, 5 - val)) + '</span>';

            let rosterHtml = managedStores.length === 0
                ? `<div style="text-align:center; padding:40px; color:var(--text-mut);"><div style="font-size:48px; margin-bottom:15px;">🤷</div><p style="font-weight:bold;">まだ店長がいません。<br>各店舗から「店長を面接して雇う」を押してください。</p></div>`
                : managedStores.map(st => {
                    let m = st.managerData;
                    let s = m.stats || [3, 3, 3, 3, 3];
                    let trafficBonus = Math.floor((m.bonus.traffic + ((st.managerLevel || 1) - 1) * 0.06 - 1) * 100);
                    let marginBonus = Math.floor((m.bonus.margin + ((st.managerLevel || 1) - 1) * 0.05 - 1) * 100);
                    return `
                    <div style="display:flex; align-items:flex-start; gap:15px; padding:18px; border-bottom:1px solid var(--border); transition:0.2s;" onmouseover="this.style.background='#f8fafc'" onmouseout="this.style.background='transparent'">
                        <div style="font-size:36px; background:#eff6ff; width:56px; height:56px; border-radius:50%; display:flex; align-items:center; justify-content:center; flex-shrink:0; box-shadow:var(--shadow-sm);">${m.icon}</div>
                        <div style="flex:1; min-width:0;">
                            <div style="display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-bottom:4px;">
                                <span style="font-size:16px; font-weight:900; color:var(--text-main);">${m.firstName} ${m.lastName || ''}</span>
                                <span style="font-size:11px; background:var(--primary); color:#fff; padding:2px 8px; border-radius:10px;">${m.type}</span>
                                <span style="font-size:11px; background:var(--gold); color:#fff; padding:2px 8px; border-radius:10px;">Lv.${st.managerLevel || 1}</span>
                            </div>
                            <div style="font-size:12px; color:var(--text-mut); margin-bottom:8px;">📍 <b>${st.name}</b></div>
                            <div style="display:grid; grid-template-columns:1fr 1fr; gap:4px; font-size:11px; color:var(--text-mut); font-weight:bold;">
                                <span>接客 ${makeStars(s[0])}</span><span>運営 ${makeStars(s[1])}</span>
                                <span>育成 ${makeStars(s[2])}</span><span>魅力 ${makeStars(s[3])}</span>
                                <span style="grid-column:span 2;">効率 ${makeStars(s[4])}</span>
                            </div>
                        </div>
                        <div style="text-align:right; flex-shrink:0; font-size:12px; font-weight:bold;">
                            <div style="color:var(--success); margin-bottom:4px;">集客 +${trafficBonus}%</div>
                            <div style="color:var(--gold); margin-bottom:10px;">利益 +${marginBonus}%</div>
                            <div style="color:var(--text-mut);">月給 ¥${(m.baseSalary / 10000).toLocaleString()}万</div>
                        </div>
                    </div>`;
                }).join('');

            let summaryBar = `
                <div style="display:flex; gap:20px; background:#fff; color:var(--text-main); padding:20px 25px; flex-wrap:wrap; border-bottom:1px solid var(--border);">
                    <div style="text-align:center;"><div style="font-size:28px; font-weight:900; color:var(--gold);">${managedStores.length}</div><div style="font-size:11px; color:#94a3b8;">店長在籍</div></div>
                    <div style="text-align:center;"><div style="font-size:28px; font-weight:900; color:var(--danger);">${emptyStores.length}</div><div style="font-size:11px; color:#94a3b8;">不在店舗</div></div>
                    <div style="text-align:center;"><div style="font-size:28px; font-weight:900; color:var(--success);">${p.stores.length > 0 ? Math.round(managedStores.length / p.stores.length * 100) : 0}%</div><div style="font-size:11px; color:#94a3b8;">配置率</div></div>
                </div>`;

            modalsArea.insertAdjacentHTML('beforeend', `
                <div id="manager-roster-modal" class="modal-overlay" style="z-index:9999;">
                    <div class="modal-content" style="max-width:620px; padding:0; overflow:hidden;">
                        <div style="display:flex; align-items:center; justify-content:space-between; padding:20px 25px; border-bottom:1px solid var(--border);">
                            <h2 style="margin:0; font-size:20px;">👔 店長名簿 <span style="font-size:13px; color:var(--text-mut); font-weight:400;">${managedStores.length}名在籍</span></h2>
                            <button class="close-btn" style="position:static;" onclick="closeModal('manager-roster-modal')">✕</button>
                        </div>
                        ${summaryBar}
                        <div style="max-height:55vh; overflow-y:auto;">${rosterHtml}</div>
                        ${emptyStores.length > 0 ? `<div style="padding:15px 20px; background:#fef9c3; border-top:1px solid #fde047; font-size:12px; color:#92400e; font-weight:bold;">⚠️ 店長不在の店舗が ${emptyStores.length} 件あります。各店舗から採用できます（¥150万）。</div>` : ''}
                    </div>
                </div>
            `);
            document.getElementById('manager-roster-modal').style.display = 'flex';
        };
    </script>
</body>
